<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Produto — Obeh</title>
  <meta name="description" content="Peça artesanal feita à mão por artesãos brasileiros. Compre direto de quem faz, com pagamento seguro via Mercado Pago." />
  <meta property="og:type" content="product" />
  <meta property="og:site_name" content="Obeh" />
  <meta name="theme-color" content="#B5502F" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .produto-container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 28px 40px;
    }

    .produto-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      margin: 32px 0;
    }

    .produto-gallery {
      position: relative;
    }

    .produto-gallery .main-image {
      width: 100%;
      aspect-ratio: 1/1;
      background: #F1EBDD;
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
    }

    .produto-thumb {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      border: 2px solid var(--line);
      flex-shrink: 0;
      cursor: pointer;
      background: #F1EBDD;
      transition: border-color 0.15s ease, transform 0.15s ease;
      padding: 0;
    }

    .produto-thumb:hover {
      border-color: var(--clay);
      transform: translateY(-2px);
    }

    .produto-gallery .main-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .produto-gallery .main-image .placeholder {
      font-size: 64px;
      opacity: 0.5;
    }

    .produto-info h1 {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .produto-info .loja-link {
      color: var(--clay);
      font-weight: 500;
      font-size: 15px;
      cursor: pointer;
    }

    .produto-info .loja-link:hover {
      text-decoration: underline;
    }

    .produto-info .price-large {
      font-family: 'Fraunces', serif;
      font-size: 40px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin: 6px 0 2px;
    }

    .produto-info .descricao {
      color: var(--ink);
      font-size: 16px;
      line-height: 1.7;
      margin: 16px 0;
      white-space: pre-wrap;
    }

    /* Modo acessibilidade: a loja pode ligar isso pra quem tem baixa visão
       (fonte maior, contraste mais forte). Ver toggle "modo_acessivel" no
       dashboard da loja. */
    body.modo-acessivel .produto-info h1 {
      font-size: 38px;
    }

    body.modo-acessivel .produto-info .descricao {
      font-size: 19px;
      line-height: 1.8;
    }

    body.modo-acessivel .produto-info .price-large {
      font-size: 38px;
    }

    body.modo-acessivel .card-title,
    body.modo-acessivel .card-maker {
      font-size: 1.15em;
    }

    .produto-info .categoria-tag {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      color: var(--olive);
      background: var(--bg-card);
      padding: 4px 12px;
      border-radius: 999px;
      display: inline-block;
      margin-bottom: 12px;
    }

    .produto-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      flex-wrap: wrap;
    }

    .produto-actions .btn {
      padding: 14px 32px;
      font-size: 15px;
    }

    .produto-actions .btn-primary {
      flex: 1;
      justify-content: center;
    }

    .produto-actions .btn-chat {
      background: var(--olive);
      border-color: var(--olive);
      color: white;
    }

    .produto-actions .btn-chat:hover {
      background: #5A6040;
      border-color: #5A6040;
    }

    /* Botões de compartilhar */
    .share-buttons {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      color: #fff;
      text-decoration: none;
      transition: transform 0.15s, opacity 0.15s;
    }
    .share-btn:hover { transform: scale(1.05); opacity: 0.9; }
    .share-whatsapp { background: #25D366; }
    .share-facebook { background: #1877F2; }
    .share-pinterest { background: #E60023; }
    .share-copiar { background: #666; }

    .produto-extra {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--line);
    }

    .produto-extra h3 {
      font-size: 18px;
      margin-bottom: 12px;
    }

    .produto-extra .detalhes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      font-size: 14px;
      color: var(--ink-soft);
    }

    .produto-extra .detalhes span {
      display: flex;
      gap: 8px;
    }

    .produto-extra .detalhes strong {
      color: var(--ink);
    }

    @media (max-width: 768px) {
      .produto-grid {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .produto-info h1 {
        font-size: 26px;
      }

      .produto-info .price-large {
        font-size: 24px;
      }

      .produto-actions {
        flex-direction: column;
      }

      .produto-actions .btn {
        width: 100%;
        justify-content: center;
      }

      .produto-extra .detalhes {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

      <symbol id="i-arrow-left" viewBox="0 0 24 24"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></symbol>
      <symbol id="i-link" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></symbol>
    </defs>
  </svg>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="wrap nav">
      <a href="index.html" class="logo">
        <img src="https://i.postimg.cc/gjpXKcn5/imagem-2026-07-01-110451621.png" alt="Obeh Logo" style="height:40px;" />
      </a>
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <a href="javascript:history.back()" class="btn btn-ghost"><svg class="icon icon-sm" aria-hidden="true"><use href="#i-arrow-left"></use></svg> Voltar</a>
        <button class="cart-btn" id="cartToggle" title="Carrinho" aria-label="Abrir carrinho">
          <svg class="icon icon-lg" aria-hidden="true"><use href="#i-cart"></use></svg> <span class="cart-btn-text">Carrinho</span> <span id="cartCount">0</span>
        </button>
      </div>
    </div>
  </header>

  <div class="produto-container">
    <div id="produtoBreadcrumb" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; font-size:14.5px; color:var(--ink-soft); margin-bottom:16px; padding-bottom:10px; border-bottom:1px solid var(--line);"></div>

    <div class="produto-grid" id="produtoContent">
      <!-- Skeleton enquanto o produto carrega (substituído via JS) -->
      <div><div class="skeleton" style="aspect-ratio:1/1; border-radius:var(--radius);"></div></div>
      <div style="display:flex; flex-direction:column; gap:14px;">
        <div class="skeleton" style="height:24px; width:35%;"></div>
        <div class="skeleton" style="height:38px; width:80%;"></div>
        <div class="skeleton" style="height:18px; width:50%;"></div>
        <div class="skeleton" style="height:160px; margin-top:10px;"></div>
        <div class="skeleton" style="height:16px; width:90%;"></div>
        <div class="skeleton" style="height:16px; width:70%;"></div>
      </div>
    </div>

    <div id="produtoVendedorCard" style="margin-top:24px; background:var(--bg-card); border:1px solid var(--line); border-radius:12px; padding:16px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;"></div>

    <div id="avaliacoesSection" style="margin-top:16px; border-top:1px solid var(--line); padding-top:24px;">
      <h2 style="font-size:22px; margin-bottom:12px;">Avaliações</h2>
      <div id="avaliacoesResumo" style="margin-bottom:16px; font-size:15px;"></div>

      <div id="avaliarFormBox" style="display:none; margin-bottom:24px; border:1px solid var(--line); border-radius:8px; padding:16px;">
        <h3 style="font-size:15px; margin-bottom:10px;">Deixe sua avaliação</h3>
        <div id="avaliarEstrelas" style="font-size:24px; cursor:pointer; margin-bottom:10px;"></div>
        <textarea id="avaliarComentario" placeholder="Conte como foi sua experiência com esta peça (opcional)..."></textarea>
        <button type="button" class="btn btn-primary" style="margin-top:10px;" onclick="enviarAvaliacao()">Enviar avaliação</button>
        <small id="avaliarStatus" style="display:block; margin-top:8px;"></small>
      </div>

      <div id="avaliacoesLista"></div>
    </div>

    <div id="relacionadosMesmaLojaSection" style="display:none; margin-top:32px; border-top:1px solid var(--line); padding-top:24px;">
      <h2 style="font-size:22px; margin-bottom:16px;">Mais desta loja</h2>
      <div class="produto-grid" id="relacionadosMesmaLoja" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:16px;"></div>
    </div>

    <div id="relacionadosDestaqueSection" style="display:none; margin-top:32px; border-top:1px solid var(--line); padding-top:24px;">
      <h2 style="font-size:20px; margin-bottom:16px;">✨ Produtos em destaque</h2>
      <div class="produto-grid" id="relacionadosDestaque" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:16px;"></div>
    </div>
  </div>

  <!-- ===== CARRINHO MODAL ===== -->
  <div id="cartModal">
    <div class="cart-box">
      <div class="cart-header">
        <h3>Seu carrinho</h3>
        <button class="close-cart" id="closeCart">✕</button>
      </div>
      <div id="cartItems">
        <p class="empty">Seu carrinho está vazio</p>
      </div>
      <div id="cartTotal">
        <span>Total</span>
        <span>R$ 0,00</span>
      </div>
      <button class="btn btn-primary btn-lg" id="checkoutBtn">Finalizar compra</button>
      <p class="secure-note" style="justify-content:center;"><svg class="icon icon-sm" aria-hidden="true"><use href="#i-lock"></use></svg> Pagamento seguro pelo Mercado Pago</p>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script>
    // ============================================
    // PRODUTO.JS - PÁGINA DO PRODUTO
    // ============================================

    let produtoData = null
    let lojaData = null

    // ===== INICIALIZAÇÃO =====
    document.addEventListener('DOMContentLoaded', async () => {
      const urlParams = new URLSearchParams(window.location.search)
      const produtoId = urlParams.get('id')

      if (!produtoId) {
        document.getElementById('produtoContent').innerHTML = `
              <div style="grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--ink-soft);">
                <div style="font-size:48px; margin-bottom:16px;">🔍</div>
                <p style="font-size:18px; font-weight:500;">Produto não encontrado</p>
                <p style="font-size:14px; margin-top:8px;"><a href="index.html" style="color:var(--clay);">Voltar para a loja</a></p>
              </div>
            `
        return
      }

      await carregarProduto(produtoId)
      carregarCarrinho()
      atualizarCarrinhoUI()
      await carregarAvaliacoes(produtoId)
      await verificarPodeAvaliar(produtoId)
    })

    // ===== AVALIAÇÕES =====
    let notaSelecionada = 0

    async function carregarAvaliacoes(produtoId) {
      const { data, error } = await supabaseClient
        .from('avaliacoes')
        .select('*')
        .eq('produto_id', produtoId)
        .order('created_at', { ascending: false })

      const resumoEl = document.getElementById('avaliacoesResumo')
      const listaEl = document.getElementById('avaliacoesLista')

      if (error || !data || data.length === 0) {
        resumoEl.textContent = 'Este produto ainda não tem avaliações.'
        listaEl.innerHTML = ''
        return
      }

      // avaliacoes.comprador_id não é uma foreign key reconhecida pelo PostgREST pra embed
      // automático, então busca os nomes dos compradores à parte e junta manualmente aqui.
      const compradorIds = [...new Set(data.map(a => a.comprador_id).filter(Boolean))]
      let nomesPorId = {}
      if (compradorIds.length > 0) {
        const { data: compradores } = await supabaseClient
          .from('users')
          .select('id, nome')
          .in('id', compradorIds)
        ;(compradores || []).forEach(c => { nomesPorId[c.id] = c.nome })
      }

      const media = data.reduce((acc, a) => acc + Number(a.nota), 0) / data.length
      resumoEl.innerHTML = `<strong>⭐ ${media.toFixed(1)}</strong> de 5 · ${data.length} avaliação(ões)`

      listaEl.innerHTML = data.map(a => `
        <div style="border-top:1px solid var(--line); padding:12px 0;">
          <div>${'⭐'.repeat(a.nota)}${'☆'.repeat(5 - a.nota)} <strong style="font-size:13px;">${nomesPorId[a.comprador_id] || 'Comprador'}</strong></div>
          ${a.comentario ? `<p style="font-size:14px; color:var(--ink-soft); margin-top:4px;">${esc(a.comentario)}</p>` : ''}
        </div>
      `).join('')
    }

    // Só pode avaliar quem teve uma compra concluída deste produto e ainda não avaliou
    async function verificarPodeAvaliar(produtoId) {
      const usuario = await getCurrentUser()
      if (!usuario) return

      const { data: vendasConcluidas } = await supabaseClient
        .from('vendas')
        .select('id')
        .eq('produto_id', produtoId)
        .eq('comprador_id', usuario.id)
        .in('status', ['pago', 'concluida', 'aprovado', 'approved'])

      if (!vendasConcluidas || vendasConcluidas.length === 0) return

      const { data: avaliacaoExistente } = await supabaseClient
        .from('avaliacoes')
        .select('id')
        .eq('produto_id', produtoId)
        .eq('comprador_id', usuario.id)
        .maybeSingle()

      if (avaliacaoExistente) return

      document.getElementById('avaliarFormBox').style.display = 'block'
      renderEstrelasSelecionaveis()
    }

    function renderEstrelasSelecionaveis() {
      const container = document.getElementById('avaliarEstrelas')
      container.innerHTML = [1, 2, 3, 4, 5].map(n => `<span onclick="selecionarNota(${n})" id="estrela-${n}">☆</span>`).join('')
    }

    function selecionarNota(n) {
      notaSelecionada = n
      for (let i = 1; i <= 5; i++) {
        document.getElementById(`estrela-${i}`).textContent = i <= n ? '⭐' : '☆'
      }
    }

    async function enviarAvaliacao() {
      const statusEl = document.getElementById('avaliarStatus')
      if (notaSelecionada === 0) {
        statusEl.textContent = '❌ Escolha de 1 a 5 estrelas.'
        return
      }

      const usuario = await getCurrentUser()
      if (!usuario || !produtoData) return

      const comentario = document.getElementById('avaliarComentario').value.trim()

      const { error } = await supabaseClient.from('avaliacoes').insert({
        produto_id: produtoData.id,
        loja_id: produtoData.loja_id,
        comprador_id: usuario.id,
        nota: notaSelecionada,
        comentario
      })

      if (error) {
        statusEl.textContent = '❌ Não foi possível enviar sua avaliação: ' + error.message
        return
      }

      await recalcularNotaLoja(produtoData.loja_id)

      document.getElementById('avaliarFormBox').style.display = 'none'
      await carregarAvaliacoes(produtoData.id)
    }

    async function recalcularNotaLoja(lojaId) {
      const { data } = await supabaseClient
        .from('avaliacoes')
        .select('nota')
        .eq('loja_id', lojaId)

      if (!data || data.length === 0) return

      const media = data.reduce((acc, a) => acc + Number(a.nota), 0) / data.length

      await supabaseClient
        .from('lojas')
        .update({ nota_media: Math.round(media * 100) / 100, total_avaliacoes: data.length })
        .eq('id', lojaId)
    }

    window.selecionarNota = selecionarNota
    window.enviarAvaliacao = enviarAvaliacao

    // ===== CARREGAR PRODUTO =====
    async function carregarProduto(id) {
      const { data, error } = await supabaseClient
        .from('produtos')
        .select(`
            *,
            lojas (
              id,
              nome_loja,
              logo,
              user_id,
              mercado_pago_link,
              modo_acessivel,
              css_personalizado_produto,
              nota_media,
              total_avaliacoes
            ),
            categorias (nome)
          `)
        .eq('id', id)
        .single()

      if (error || !data) {
        document.getElementById('produtoContent').innerHTML = `
              <div style="grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--ink-soft);">
                <div style="font-size:48px; margin-bottom:16px;">🔍</div>
                <p style="font-size:18px; font-weight:500;">Produto não encontrado</p>
                <p style="font-size:14px; margin-top:8px;"><a href="index.html" style="color:var(--clay);">Voltar para a loja</a></p>
              </div>
            `
        return
      }

      produtoData = data
      lojaData = data.lojas

      document.body.classList.toggle('modo-acessivel', Boolean(lojaData?.modo_acessivel))
      // Página de produto usa o padrão do Obeh por padrão — só aplica CSS
      // personalizado se o vendedor especificamente customizou ELA (categoria
      // separada da personalização da loja, no assistente de IA do painel).
      if (lojaData?.css_personalizado_produto) {
        const styleEl = document.createElement('style')
        styleEl.textContent = lojaData.css_personalizado_produto
        document.head.appendChild(styleEl)
      }

      renderizarProduto(data)
      carregarProdutosRelacionados(data)
      atualizarBotaoFavorito()
    }

    // ===== FAVORITOS =====
    async function atualizarBotaoFavorito() {
      const btn = document.getElementById('btnFavoritar')
      if (!btn || !produtoData) return
      const usuario = await getCurrentUser()
      if (!usuario) { btn.textContent = '🤍'; return }

      const { data } = await supabaseClient
        .from('favoritos')
        .select('id')
        .eq('user_id', usuario.id)
        .eq('produto_id', produtoData.id)
        .maybeSingle()

      btn.textContent = data ? '❤️' : '🤍'
    }

    async function toggleFavorito() {
      if (!produtoData) return
      const usuario = await getCurrentUser()
      if (!usuario) {
        if (confirm('Você precisa estar logado pra favoritar. Ir para o login agora?')) {
          window.location.href = `login.html?retorno=${encodeURIComponent(window.location.pathname + window.location.search)}`
        }
        return
      }

      const btn = document.getElementById('btnFavoritar')
      const jaFavoritado = btn.textContent.trim() === '❤️'

      if (jaFavoritado) {
        await supabaseClient.from('favoritos').delete().eq('user_id', usuario.id).eq('produto_id', produtoData.id)
        btn.textContent = '🤍'
      } else {
        await supabaseClient.from('favoritos').insert({ user_id: usuario.id, produto_id: produtoData.id })
        btn.textContent = '❤️'
      }
    }

    // ===== COMPARTILHAR PRODUTO =====
    function compartilhar(rede) {
      if (!produtoData) return
      const url = window.location.href
      const nome = produtoData.nome || 'Produto artesanal'
      const loja = lojaData?.nome_loja || 'Obeh'
      const texto = encodeURIComponent(`Olha que lindo esse(a) "${nome}" da loja ${loja} na Obeh! 🧵✨`)
      const urlEnc = encodeURIComponent(url)

      switch (rede) {
        case 'whatsapp':
          window.open(`https://wa.me/?text=${texto}%20${urlEnc}`, '_blank')
          break
        case 'facebook':
          window.open(`https://www.facebook.com/sharer/sharer.php?u=${urlEnc}`, '_blank')
          break
        case 'pinterest':
          const img = produtoData.fotos?.[0] || ''
          window.open(`https://pinterest.com/pin/create/button/?url=${urlEnc}&description=${texto}&media=${encodeURIComponent(img)}`, '_blank')
          break
        case 'copiar':
          navigator.clipboard.writeText(url).then(() => {
            alert('🔗 Link copiado!')
          }).catch(() => {
            prompt('Copie o link:', url)
          })
          break
      }
    }

    // ===== PRODUTOS RELACIONADOS =====
    function renderizarCardsRelacionados(lista) {
      return lista.map(p => `
        <div class="card" onclick="window.location.href='produto.html?id=${p.id}'">
          <div class="card-media" style="background:#E9DFC7;">
            ${p.fotos && p.fotos.length > 0
              ? `<img src="${p.fotos[0]}" alt="${esc(p.nome)}" loading="lazy" />`
              : `<span class="placeholder">🧵</span>`
            }
          </div>
          <div class="card-body">
            <div class="card-title">${esc(p.nome)}</div>
            <div class="card-maker">${p.lojas?.nome_loja || ''}</div>
            <div class="price">R$ ${Number(p.preco).toFixed(2).replace('.', ',')}</div>
          </div>
        </div>
      `).join('')
    }

    async function carregarProdutosRelacionados(p) {
      // Mais produtos da mesma loja
      const { data: mesmaLoja } = await supabaseClient
        .from('produtos')
        .select('id, nome, preco, fotos')
        .eq('loja_id', p.loja_id)
        .eq('status', 'ativo')
        .neq('id', p.id)
        .limit(6)

      if (mesmaLoja && mesmaLoja.length > 0) {
        document.getElementById('relacionadosMesmaLojaSection').style.display = 'block'
        document.getElementById('relacionadosMesmaLoja').innerHTML = renderizarCardsRelacionados(mesmaLoja)
      }

      // Produtos em destaque de qualquer loja (exclui os já mostrados acima e o atual)
      const { data: destaque } = await supabaseClient
        .from('produtos')
        .select('id, nome, preco, fotos, lojas(nome_loja)')
        .eq('destaque', true)
        .eq('status', 'ativo')
        .neq('id', p.id)
        .limit(6)

      const idsMesmaLoja = new Set((mesmaLoja || []).map(x => x.id))
      const destaqueFiltrado = (destaque || []).filter(x => !idsMesmaLoja.has(x.id))

      if (destaqueFiltrado.length > 0) {
        document.getElementById('relacionadosDestaqueSection').style.display = 'block'
        document.getElementById('relacionadosDestaque').innerHTML = renderizarCardsRelacionados(destaqueFiltrado)
      }
    }

    // ===== RENDERIZAR PRODUTO =====
    function renderizarProduto(p) {
      const container = document.getElementById('produtoContent')

      const fotos = p.fotos || []
      const imagemPrincipal = fotos.length > 0 ? fotos[0] : null
      const nomeLoja = lojaData?.nome_loja || 'Artesão'

      // SEO: título da aba com o nome do produto e da loja
      document.title = `${p.nome} — ${nomeLoja} | Obeh`

      // Breadcrumb + selos de confiança
      document.getElementById('produtoBreadcrumb').innerHTML = `
        <span><a href="index.html" style="color:inherit;">Início</a> &gt; ${p.categorias?.nome ? `${p.categorias.nome} &gt; ` : ''}${esc(p.nome)}</span>
        <span style="display:flex; gap:14px; flex-wrap:wrap;">
          <span style="display:inline-flex; align-items:center; gap:5px;"><svg class="icon icon-sm" aria-hidden="true"><use href="#i-lock"></use></svg> Compra segura</span>
          <span style="display:inline-flex; align-items:center; gap:5px;"><svg class="icon icon-sm" aria-hidden="true"><use href="#i-truck"></use></svg> Envio direto do artesão</span>
        </span>
      `

      // Parcelamento em até 12x (só exibe quando a parcela vale a pena)
      const precoNum = Number(p.preco)
      const parcelamentoHtml = precoNum >= 30
        ? `<div class="installments" style="font-size:15px;">ou até <strong>12x de R$ ${(precoNum / 12).toFixed(2).replace('.', ',')}</strong> no cartão</div>`
        : ''

      container.innerHTML = `
            <!-- Galeria -->
            <div class="produto-gallery">
              <div class="main-image">
                ${imagemPrincipal
                  ? `<img src="${imagemPrincipal}" alt="${esc(p.nome)}" />`
                  : `<span class="placeholder">🧵</span>`
                }
              </div>
              ${fotos.length > 1 ? `
                <div style="display:flex; gap:10px; margin-top:14px; overflow-x:auto; padding-bottom:8px;">
                  ${fotos.map(f => `
                    <button class="produto-thumb" onclick="trocarImagem('${f}')" aria-label="Ver esta foto">
                      <img src="${f}" alt="Miniatura" style="width:100%; height:100%; object-fit:cover;" />
                    </button>
                  `).join('')}
                </div>
              ` : ''}
            </div>

            <!-- Informações -->
            <div class="produto-info">
              <div class="categoria-tag">${p.categorias?.nome || 'Artesanato'}</div>
              <h1>${esc(p.nome)}</h1>
              <div class="loja-link" onclick="window.location.href='loja.html?id=${lojaData?.id}'" style="display:inline-flex; align-items:center; gap:6px;">
                <svg class="icon icon-sm" aria-hidden="true"><use href="#i-store"></use></svg> ${esc(nomeLoja)}${lojaData?.nota_media ? ` <span class="rating-stars"><svg class="star" viewBox="0 0 24 24" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg><span class="rating-num">${Number(lojaData.nota_media).toFixed(1)}</span>${lojaData.total_avaliacoes ? `<span>(${lojaData.total_avaliacoes})</span>` : ''}</span>` : ''}
              </div>

              <div style="background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); padding:24px; margin:16px 0; box-shadow:var(--shadow);">
                ${p.em_promocao ? '<span style="display:inline-block; background:var(--clay); color:#fff; font-size:12.5px; font-weight:700; padding:4px 14px; border-radius:999px; margin-bottom:8px;">Promoção</span>' : ''}
                ${p.em_promocao && p.preco_antigo ? `<div class="price-old" style="font-size:16px;">R$ ${Number(p.preco_antigo).toFixed(2).replace('.', ',')}</div>` : ''}
                <div class="price-large">R$ ${precoNum.toFixed(2).replace('.', ',')}</div>
                ${parcelamentoHtml}
                ${p.desconto_pix_percentual ? `
                  <p class="pix-tag" style="margin:8px 0 0; font-size:14px;">
                    <svg class="icon icon-sm" aria-hidden="true"><use href="#i-zap"></use></svg>
                    R$ ${(precoNum * (1 - Number(p.desconto_pix_percentual) / 100)).toFixed(2).replace('.', ',')} no Pix (${p.desconto_pix_percentual}% de desconto)
                  </p>
                ` : ''}
                <div class="produto-actions" style="margin-top:18px;">
                  <button class="btn btn-primary btn-lg" onclick="comprarAgora()" style="flex:1.2;">
                    Comprar agora
                  </button>
                  <button class="btn btn-outline btn-lg" onclick="adicionarAoCarrinhoClique()">
                    <svg class="icon" aria-hidden="true"><use href="#i-cart"></use></svg> Adicionar
                  </button>
                  <button class="btn btn-outline" id="btnFavoritar" onclick="toggleFavorito()" title="Favoritar" aria-label="Adicionar aos favoritos" style="flex:0 0 auto; padding:0 18px; min-width:56px;">
                    🤍
                  </button>
                </div>
                <div class="trust-list" style="margin-top:16px;">
                  <span class="trust-row"><svg class="icon" aria-hidden="true"><use href="#i-lock"></use></svg> <strong>Compra protegida</strong>&nbsp;do início ao fim</span>
                  <span class="trust-row"><svg class="icon" aria-hidden="true"><use href="#i-card"></use></svg> Pix e cartão em até 12x via Mercado Pago</span>
                  <span class="trust-row"><svg class="icon" aria-hidden="true"><use href="#i-users"></use></svg> Dinheiro direto pro artesão</span>
                </div>
              </div>

              <div style="display:flex; gap:16px; flex-wrap:wrap; font-size:14.5px; color:var(--ink-soft); margin-bottom:16px;">
                <span style="display:inline-flex; align-items:center; gap:6px;">${p.status === 'ativo' ? (Number(p.estoque) > 0 && Number(p.estoque) <= 3 ? `<strong style="color:var(--clay);">Últimas ${p.estoque} unidade(s)!</strong>` : `<svg class="icon icon-sm" style="color:var(--green);" aria-hidden="true"><use href="#i-check"></use></svg> Estoque disponível`) : 'Indisponível'}</span>
                <span style="display:inline-flex; align-items:center; gap:6px;"><svg class="icon icon-sm" aria-hidden="true"><use href="#i-package"></use></svg> ${p.sob_encomenda
                  ? `Sob encomenda${p.prazo_producao_dias ? ` — envio em até ${p.prazo_producao_dias} dia(s)` : ''}`
                  : 'Pronta entrega'
                }</span>
              </div>

              <div class="descricao">${p.descricao || 'Sem descrição detalhada.'}</div>

              <div class="share-buttons">
                <span style="font-size:12px; color:var(--ink-soft); align-self:center;">Compartilhar:</span>
                <button class="share-btn share-whatsapp" onclick="compartilhar('whatsapp')" title="WhatsApp">WhatsApp</button>
                <button class="share-btn share-facebook" onclick="compartilhar('facebook')" title="Facebook">Facebook</button>
                <button class="share-btn share-pinterest" onclick="compartilhar('pinterest')" title="Pinterest">Pinterest</button>
                <button class="share-btn share-copiar" onclick="compartilhar('copiar')" title="Copiar link"><svg class="icon icon-sm" aria-hidden="true" style="vertical-align:-3px;"><use href="#i-link"></use></svg> Copiar link</button>
              </div>

              <div class="produto-extra">
                <h3>Detalhes do produto</h3>
                <div class="detalhes">
                  <span><strong>Estoque:</strong> ${p.estoque || 1} unidades</span>
                  <span><strong>Categoria:</strong> ${p.categorias?.nome || 'Não definida'}</span>
                  <span><strong>Publicado em:</strong> ${new Date(p.created_at).toLocaleDateString('pt-BR')}</span>
                </div>
              </div>
            </div>
          `

      // Barra fixa de compra no mobile — preço + CTA sempre visíveis
      montarBarraFixaCompra(p, parcelamentoHtml)

      // Cartão do vendedor — "Quem fez esta peça"
      document.getElementById('produtoVendedorCard').innerHTML = `
        <div class="artisan-avatar">
          ${lojaData?.logo ? `<img src="${lojaData.logo}" alt="${esc(nomeLoja)}" />` : '🧵'}
        </div>
        <div class="artisan-info">
          <div class="artisan-label">Quem fez esta peça</div>
          <h3>${esc(nomeLoja)}</h3>
          <p>${lojaData?.nota_media ? `⭐ ${Number(lojaData.nota_media).toFixed(1)} de 5 · ${lojaData.total_avaliacoes || 0} avaliação(ões) de compradores` : 'Ateliê novo na Obeh — ainda sem avaliações'}</p>
        </div>
        <button class="btn btn-ghost" onclick="abrirChat()"><svg class="icon icon-sm" aria-hidden="true"><use href="#i-chat"></use></svg> Conversar com o artesão</button>
        <button class="btn btn-outline" onclick="window.location.href='loja.html?id=${lojaData?.id}'"><svg class="icon icon-sm" aria-hidden="true"><use href="#i-store"></use></svg> Ver a loja</button>
      `

      // SEO: injeta dados estruturados (Product + Breadcrumb) e canonical dinâmico
      injetarSeoProduto(p)
    }

    // ===== BARRA FIXA DE COMPRA (mobile) =====
    // Mantém preço + "Comprar agora" sempre visíveis no celular.
    function montarBarraFixaCompra(p, parcelamentoHtml) {
      let bar = document.getElementById('stickyBuyBar')
      if (!bar) {
        bar = document.createElement('div')
        bar.id = 'stickyBuyBar'
        bar.className = 'sticky-buy-bar'
        document.body.appendChild(bar)
      }

      const disponivel = p.status === 'ativo' && Number(p.estoque) > 0
      bar.innerHTML = `
        <div class="sbb-price">
          <span class="price">R$ ${Number(p.preco).toFixed(2).replace('.', ',')}</span>
          ${Number(p.preco) >= 30 ? `<span class="installments">até 12x de R$ ${(Number(p.preco) / 12).toFixed(2).replace('.', ',')}</span>` : ''}
        </div>
        <button class="btn btn-primary" onclick="comprarAgora()" ${disponivel ? '' : 'disabled style="opacity:0.5;"'}>
          ${disponivel ? 'Comprar agora' : 'Indisponível'}
        </button>
      `
      bar.classList.add('active')
      document.body.classList.add('has-sticky-buy')
    }

    // ===== SEO: JSON-LD + canonical (apenas leitura dos dados já carregados) =====
    function injetarSeoProduto(p) {
      const urlProduto = `https://obeh.com.br/produto.html?id=${p.id}`
      const nomeLoja = lojaData?.nome_loja || 'Artesão'

      let canonical = document.querySelector('link[rel="canonical"]')
      if (!canonical) {
        canonical = document.createElement('link')
        canonical.rel = 'canonical'
        document.head.appendChild(canonical)
      }
      canonical.href = urlProduto

      const ld = {
        '@context': 'https://schema.org',
        '@graph': [
          {
            '@type': 'Product',
            name: p.nome,
            description: (p.descricao || '').slice(0, 300) || 'Peça artesanal feita à mão.',
            image: (p.fotos && p.fotos.length > 0) ? p.fotos : undefined,
            category: p.categorias?.nome || 'Artesanato',
            url: urlProduto,
            offers: {
              '@type': 'Offer',
              price: Number(p.preco).toFixed(2),
              priceCurrency: 'BRL',
              availability: p.status === 'ativo' && Number(p.estoque) > 0
                ? 'https://schema.org/InStock'
                : 'https://schema.org/OutOfStock',
              url: urlProduto,
              seller: { '@type': 'Organization', name: nomeLoja }
            },
            ...(lojaData?.nota_media ? {
              aggregateRating: {
                '@type': 'AggregateRating',
                ratingValue: Number(lojaData.nota_media).toFixed(1),
                reviewCount: lojaData.total_avaliacoes || 1
              }
            } : {})
          },
          {
            '@type': 'BreadcrumbList',
            itemListElement: [
              { '@type': 'ListItem', position: 1, name: 'Início', item: 'https://obeh.com.br/' },
              ...(p.categorias?.nome ? [{ '@type': 'ListItem', position: 2, name: p.categorias.nome }] : []),
              { '@type': 'ListItem', position: p.categorias?.nome ? 3 : 2, name: p.nome, item: urlProduto }
            ]
          }
        ]
      }

      const scriptEl = document.createElement('script')
      scriptEl.type = 'application/ld+json'
      scriptEl.textContent = JSON.stringify(ld)
      document.head.appendChild(scriptEl)

      const metaDesc = document.querySelector('meta[name="description"]')
      if (metaDesc && p.descricao) {
        metaDesc.setAttribute('content', `${p.nome} — feito à mão por ${nomeLoja}. ${(p.descricao || '').slice(0, 140)}`)
      }
    }

    // ===== TROCAR IMAGEM =====
    function trocarImagem(url) {
      const mainImage = document.querySelector('.produto-gallery .main-image img')
      if (mainImage) {
        mainImage.src = url
      } else {
        const mainDiv = document.querySelector('.produto-gallery .main-image')
        mainDiv.innerHTML = `<img src="${url}" alt="Produto" />`
      }
    }

    // ===== CARRINHO =====
    function carregarCarrinho() {
      document.getElementById('cartToggle').addEventListener('click', () => {
        const modal = document.getElementById('cartModal')
        modal.style.display = modal.style.display === 'none' ? 'block' : 'block'
        renderizarCarrinho()
      })

      document.getElementById('closeCart').addEventListener('click', () => {
        document.getElementById('cartModal').style.display = 'none'
      })

      document.getElementById('cartModal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) {
          document.getElementById('cartModal').style.display = 'none'
        }
      })

      document.getElementById('checkoutBtn').addEventListener('click', () => {
        if (carrinho.length === 0) {
          alert('🛒 Seu carrinho está vazio!')
          return
        }
        window.location.href = 'carrinho.html'
      })
    }

    function renderizarCarrinho() {
      const container = document.getElementById('cartItems')
      const total = document.getElementById('cartTotal').querySelector('span:last-child')

      if (carrinho.length === 0) {
        container.innerHTML = '<p class="empty">Seu carrinho está vazio</p>'
        total.textContent = 'R$ 0,00'
        return
      }

      container.innerHTML = carrinho.map(item => `
            <div class="cart-item">
              <div class="cart-item-info">
                <div class="cart-item-name">${item.nome}</div>
                <div class="cart-item-detail">R$ ${Number(item.preco).toFixed(2).replace('.', ',')} x ${item.quantidade}</div>
              </div>
              <div class="cart-item-actions">
                <button onclick="atualizarQuantidadeCarrinho('${item.id}', -1)">−</button>
                <span class="cart-item-qty">${item.quantidade}</span>
                <button onclick="atualizarQuantidadeCarrinho('${item.id}', 1)">+</button>
                <button class="remove-item" onclick="removerItemCarrinho('${item.id}')">✕</button>
              </div>
            </div>
          `).join('')

      const totalValue = getTotalCarrinho()
      total.textContent = `R$ ${totalValue.toFixed(2).replace('.', ',')}`
    }

    function adicionarAoCarrinhoClique() {
      if (!produtoData) return

      adicionarAoCarrinho({
        id: produtoData.id,
        nome: produtoData.nome,
        preco: produtoData.preco,
        fotos: produtoData.fotos,
        loja_id: produtoData.loja_id,
        loja_nome: lojaData?.nome_loja || 'Loja',
        desconto_pix_percentual: produtoData.desconto_pix_percentual || null
      })

      renderizarCarrinho()
      atualizarCarrinhoUI()

      // Feedback visual no botão correto (Adicionar ao carrinho)
      const btn = document.querySelector('.produto-actions .btn-outline')
      if (btn) {
        const htmlOriginal = btn.innerHTML
        btn.innerHTML = '<svg class="icon" aria-hidden="true"><use href="#i-check"></use></svg> Adicionado!'
        btn.style.background = 'var(--green)'
        btn.style.borderColor = 'var(--green)'
        btn.style.color = 'white'
        setTimeout(() => {
          btn.innerHTML = htmlOriginal
          btn.style.background = ''
          btn.style.borderColor = ''
          btn.style.color = ''
        }, 2000)
      }
    }

    // Compra direta: bota o produto no carrinho e já leva pro checkout dessa
    // loja (aba já aberta), sem precisar passar pelo carrinho manualmente.
    function comprarAgora() {
      if (!produtoData) return

      adicionarAoCarrinho({
        id: produtoData.id,
        nome: produtoData.nome,
        preco: produtoData.preco,
        fotos: produtoData.fotos,
        loja_id: produtoData.loja_id,
        loja_nome: lojaData?.nome_loja || 'Loja'
      })

      window.location.href = `carrinho.html?loja=${produtoData.loja_id}`
    }

    function atualizarQuantidadeCarrinho(produtoId, delta) {
      atualizarQuantidade(produtoId, delta)
      renderizarCarrinho()
      atualizarCarrinhoUI()
    }

    function removerItemCarrinho(produtoId) {
      removerDoCarrinho(produtoId)
      renderizarCarrinho()
      atualizarCarrinhoUI()
    }

    // ===== CHAT =====
    function abrirChat() {
      if (!lojaData || !lojaData.user_id) {
        alert('Artêsao não encontrado para conversar.')
        return
      }
      window.location.href = `chat.html?user=${lojaData.user_id}&produto=${produtoData.id}`
    }

    // ===== FUNÇÕES GLOBAIS =====
    window.trocarImagem = trocarImagem
    window.adicionarAoCarrinhoClique = adicionarAoCarrinhoClique
    window.comprarAgora = comprarAgora
    window.atualizarQuantidadeCarrinho = atualizarQuantidadeCarrinho
    window.removerItemCarrinho = removerItemCarrinho
    window.abrirChat = abrirChat
    window.toggleFavorito = toggleFavorito

    console.log('✅ Página do produto carregada com sucesso!')
  </script>
