<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Lojas de Artesanato — Conheça os Ateliês | Obeh</title>
  <meta name="description" content="Descubra lojas de artesanato brasileiro na Obeh. Cada ateliê é de um artesão de verdade — filtre por categoria e compre direto de quem faz." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Obeh" />
  <meta name="theme-color" content="#B5502F" />
  <link rel="canonical" href="https://obeh.com.br/lojas.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .lojas-container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 28px 60px;
    }

    .lojas-hero {
      text-align: center;
      padding: 48px 20px 32px;
    }

    .lojas-hero h1 {
      font-size: clamp(28px, 3vw, 38px);
      margin-bottom: 10px;
    }

    .lojas-hero p {
      color: var(--ink-soft);
      font-size: 16.5px;
      max-width: 560px;
      margin: 0 auto;
    }

    .lojas-filtros {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 32px;
    }

    .lojas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    .loja-tile {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .loja-tile:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .loja-tile .loja-logo {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      margin: 0 auto 12px;
      overflow: hidden;
      background: #E9DFC7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      border: 3px solid var(--line);
    }

    .loja-tile .loja-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .loja-tile .loja-nome {
      font-weight: 600;
      font-size: 17.5px;
      margin-bottom: 4px;
    }

    .loja-tile .loja-categoria {
      font-size: 13.5px;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }

    .loja-tile .loja-desc {
      font-size: 14.5px;
      color: var(--ink-soft);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .loja-tile .loja-nota {
      margin-top: 8px;
      font-size: 13.5px;
      color: var(--clay);
    }

    .lojas-empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-soft);
    }

    .lojas-empty .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <!-- ===== ÍCONES DE INTERFACE ===== -->
  <svg style="position:absolute; width:0; height:0; overflow:hidden;" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
      <symbol id="i-arrow-left" viewBox="0 0 24 24"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></symbol>
      <symbol id="i-store" viewBox="0 0 24 24"><path d="M3 9l1.2-5h15.6L21 9"/><path d="M3 9c0 1.5 1.3 3 3 3s3-1.5 3-3c0 1.5 1.3 3 3 3s3-1.5 3-3c0 1.5 1.3 3 3 3s3-1.5 3-3"/><path d="M4.5 12v8h15v-8"/><path d="M9.5 20v-5h5v5"/></symbol>
    </defs>
  </svg>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="wrap nav">
      <a href="index.html" class="logo">
        <img src="https://i.postimg.cc/gjpXKcn5/imagem-2026-07-01-110451621.png" alt="Obeh Logo" style="height:40px;" />
      </a>
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <a href="index.html" class="btn btn-ghost"><svg class="icon icon-sm" aria-hidden="true"><use href="#i-arrow-left"></use></svg> Voltar ao início</a>
      </div>
    </div>
  </header>

  <div class="lojas-hero">
    <p style="font-family:'Space Mono', monospace; font-size:12px; text-transform:uppercase; letter-spacing:0.08em; color:var(--olive); margin-bottom:8px;">Ateliês do Obeh</p>
    <h1 style="text-wrap:balance;">Conheça as lojas dos nossos artesãos</h1>
    <p>Cada loja é feita por um artesão de verdade. Filtre por categoria e descubra novos ateliês.</p>
  </div>

  <div class="lojas-container">
    <div class="lojas-filtros" id="lojasFiltros">
      <!-- Injetado via JS -->
    </div>
    <div class="lojas-grid" id="lojasGrid">
      <!-- Injetado via JS -->
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script>
    let lojasGlobal = []
    let categoriaLojaAtiva = null

    document.addEventListener('DOMContentLoaded', async () => {
      lojasGlobal = await getLojasAtivas()
      renderizarFiltros()
      renderizarLojas()
    })

    function renderizarFiltros() {
      const container = document.getElementById('lojasFiltros')
      const categorias = [...new Set(lojasGlobal.map(l => l.categoria).filter(Boolean))].sort()

      container.innerHTML = `
        <div class="chip active" onclick="filtrarLojasPorCategoria(null)">
          <span class="dot"></span>Todas
        </div>
        ${categorias.map(cat => `
          <div class="chip" onclick="filtrarLojasPorCategoria('${cat.replace(/'/g, "\\'")}')">
            <span class="dot"></span>${cat}
          </div>
        `).join('')}
      `
    }

    function renderizarLojas() {
      const grid = document.getElementById('lojasGrid')
      const filtradas = categoriaLojaAtiva
        ? lojasGlobal.filter(l => l.categoria === categoriaLojaAtiva)
        : lojasGlobal

      if (filtradas.length === 0) {
        grid.innerHTML = `
          <div class="lojas-empty">
            <div class="icon">🏪</div>
            <p style="font-size:18px; font-weight:500;">Nenhuma loja encontrada</p>
            <p style="font-size:14px; margin-top:8px;">Volte em breve para ver novos ateliês.</p>
          </div>
        `
        return
      }

      grid.innerHTML = filtradas.map(l => `
        <div class="loja-tile" style="border-color:${l.cor_destaque || 'var(--line)'};" onclick="window.location.href='loja.html?id=${l.id}'">
          <div class="loja-logo">
            ${l.logo ? `<img src="${l.logo}" alt="${esc(l.nome_loja)}" />` : '🧵'}
          </div>
          <div class="loja-nome">${esc(l.nome_loja)}</div>
          ${l.categoria ? `<div class="loja-categoria">${esc(l.categoria)}</div>` : ''}
          ${l.descricao ? `<div class="loja-desc">${esc(l.descricao)}</div>` : ''}
          <div class="loja-nota rating-stars" style="justify-content:center; margin-top:10px;">
            <svg class="star" viewBox="0 0 24 24" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26"/></svg>
            <span class="rating-num">${Number(l.nota_media || 5).toFixed(1)}</span> ${l.total_avaliacoes ? `<span>(${l.total_avaliacoes})</span>` : ''}
          </div>
          <span class="btn btn-outline" style="margin-top:12px; width:100%; min-height:42px; font-size:14px;">Visitar loja</span>
        </div>
      `).join('')
    }

    window.filtrarLojasPorCategoria = function (categoria) {
      categoriaLojaAtiva = categoria
      document.querySelectorAll('#lojasFiltros .chip').forEach(c => c.classList.remove('active'))
      if (categoria) {
        document.querySelectorAll('#lojasFiltros .chip').forEach(c => {
          if (c.onclick && c.onclick.toString().includes(`'${categoria.replace(/'/g, "\\'")}'`)) {
            c.classList.add('active')
          }
        })
      } else {
        document.querySelector('#lojasFiltros .chip:first-child').classList.add('active')
      }
      renderizarLojas()
    }
  </script>

</body>
</html>
