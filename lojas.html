<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Lojas — Obeh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .lojas-container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 28px 60px;
    }

    .lojas-hero {
      text-align: center;
      padding: 48px 20px 32px;
    }

    .lojas-hero h1 {
      font-size: clamp(28px, 3vw, 38px);
      margin-bottom: 10px;
    }

    .lojas-hero p {
      color: var(--ink-soft);
      font-size: 15px;
      max-width: 560px;
      margin: 0 auto;
    }

    .lojas-filtros {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 32px;
    }

    .lojas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
    }

    .loja-tile {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .loja-tile:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
    }

    .loja-tile .loja-logo {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      margin: 0 auto 12px;
      overflow: hidden;
      background: #E9DFC7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      border: 3px solid var(--line);
    }

    .loja-tile .loja-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .loja-tile .loja-nome {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .loja-tile .loja-categoria {
      font-size: 12px;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }

    .loja-tile .loja-desc {
      font-size: 13px;
      color: var(--ink-soft);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .loja-tile .loja-nota {
      margin-top: 8px;
      font-size: 12px;
      color: var(--clay);
    }

    .lojas-empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-soft);
    }

    .lojas-empty .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="wrap nav">
      <a href="index.html" class="logo">
        <img src="https://i.postimg.cc/gjpXKcn5/imagem-2026-07-01-110451621.png" alt="Obeh Logo" style="height:40px;" />
      </a>
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <a href="index.html" class="btn btn-ghost" style="padding:6px 16px; font-size:12px;">← Voltar à loja</a>
      </div>
    </div>
  </header>

  <div class="lojas-hero">
    <p style="font-family:'Space Mono', monospace; font-size:11px; text-transform:uppercase; color:var(--olive); margin-bottom:8px;">🏪 Ateliês do Obeh</p>
    <h1>Conheça as lojas dos nossos artesãos</h1>
    <p>Cada loja é feita por um artesão de verdade. Filtre por categoria e descubra novos ateliês.</p>
  </div>

  <div class="lojas-container">
    <div class="lojas-filtros" id="lojasFiltros">
      <!-- Injetado via JS -->
    </div>
    <div class="lojas-grid" id="lojasGrid">
      <!-- Injetado via JS -->
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script>
    let lojasGlobal = []
    let categoriaLojaAtiva = null

    document.addEventListener('DOMContentLoaded', async () => {
      lojasGlobal = await getLojasAtivas()
      renderizarFiltros()
      renderizarLojas()
    })

    function renderizarFiltros() {
      const container = document.getElementById('lojasFiltros')
      const categorias = [...new Set(lojasGlobal.map(l => l.categoria).filter(Boolean))].sort()

      container.innerHTML = `
        <div class="chip active" onclick="filtrarLojasPorCategoria(null)">
          <span class="dot"></span>Todas
        </div>
        ${categorias.map(cat => `
          <div class="chip" onclick="filtrarLojasPorCategoria('${cat.replace(/'/g, "\\'")}')">
            <span class="dot"></span>${cat}
          </div>
        `).join('')}
      `
    }

    function renderizarLojas() {
      const grid = document.getElementById('lojasGrid')
      const filtradas = categoriaLojaAtiva
        ? lojasGlobal.filter(l => l.categoria === categoriaLojaAtiva)
        : lojasGlobal

      if (filtradas.length === 0) {
        grid.innerHTML = `
          <div class="lojas-empty">
            <div class="icon">🏪</div>
            <p style="font-size:18px; font-weight:500;">Nenhuma loja encontrada</p>
            <p style="font-size:14px; margin-top:8px;">Volte em breve para ver novos ateliês.</p>
          </div>
        `
        return
      }

      grid.innerHTML = filtradas.map(l => `
        <div class="loja-tile" style="border-color:${l.cor_destaque || 'var(--line)'};" onclick="window.location.href='loja.html?id=${l.id}'">
          <div class="loja-logo">
            ${l.logo ? `<img src="${l.logo}" alt="${esc(l.nome_loja)}" />` : '🧵'}
          </div>
          <div class="loja-nome">${esc(l.nome_loja)}</div>
          ${l.categoria ? `<div class="loja-categoria">${esc(l.categoria)}</div>` : ''}
          ${l.descricao ? `<div class="loja-desc">${esc(l.descricao)}</div>` : ''}
          <div class="loja-nota">⭐ ${Number(l.nota_media || 5).toFixed(1)} ${l.total_avaliacoes ? `(${l.total_avaliacoes})` : ''}</div>
        </div>
      `).join('')
    }

    window.filtrarLojasPorCategoria = function (categoria) {
      categoriaLojaAtiva = categoria
      document.querySelectorAll('#lojasFiltros .chip').forEach(c => c.classList.remove('active'))
      if (categoria) {
        document.querySelectorAll('#lojasFiltros .chip').forEach(c => {
          if (c.onclick && c.onclick.toString().includes(`'${categoria.replace(/'/g, "\\'")}'`)) {
            c.classList.add('active')
          }
        })
      } else {
        document.querySelector('#lojasFiltros .chip:first-child').classList.add('active')
      }
      renderizarLojas()
    }
  </script>

</body>
</html>
