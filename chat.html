<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Chat — Obeh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .chat-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 28px 40px;
    }

    .chat-container h1 {
      font-size: 28px;
      margin: 24px 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-box {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 8px;
      height: 480px;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
    }

    .chat-box .mensagem {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .chat-box .mensagem.enviada {
      background: var(--clay);
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .chat-box .mensagem.recebida {
      background: var(--white);
      border: 1px solid var(--line);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .chat-box .mensagem .hora {
      font-size: 10px;
      opacity: 0.7;
      margin-top: 4px;
      display: block;
    }

    .chat-box .mensagem .sistema {
      text-align: center;
      color: var(--ink-soft);
      font-size: 12px;
      padding: 8px;
      background: transparent;
      align-self: center;
    }

    .chat-input-area {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .chat-input-area textarea {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      font-family: 'Work Sans';
      font-size: 14px;
      resize: vertical;
      min-height: 48px;
      max-height: 120px;
    }

    .chat-input-area textarea:focus {
      outline: 2px solid var(--clay);
      border-color: var(--clay);
    }

    .chat-input-area .btn {
      padding: 12px 24px;
      height: 48px;
      flex-shrink: 0;
    }

    .chat-info {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .chat-info .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #E9DFC7;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .chat-info .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .chat-info .nome {
      font-weight: 600;
      font-size: 16px;
    }

    .chat-info .status {
      font-size: 12px;
      color: var(--ink-soft);
    }

    .chat-vazio {
      text-align: center;
      padding: 40px;
      color: var(--ink-soft);
    }

    .chat-vazio .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    @media (max-width: 600px) {
      .chat-container h1 {
        font-size: 22px;
      }

      .chat-box {
        height: 340px;
        padding: 12px;
      }

      .chat-box .mensagem {
        max-width: 85%;
        font-size: 13px;
        padding: 10px 12px;
      }

      .chat-input-area {
        flex-direction: column;
      }

      .chat-input-area .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="wrap nav">
      <a href="index.html" class="logo">
        <img src="https://i.postimg.cc/gjpXKcn5/imagem-2026-07-01-110451621.png" alt="Obeh Logo" style="height:40px;" />
      </a>
      <a href="javascript:history.back()" class="btn btn-ghost" style="padding:6px 16px; font-size:12px;">← Voltar</a>
    </div>
  </header>

  <div class="chat-container">
    <h1>💬 Conversa</h1>

    <div id="chatInfo" class="chat-info">
      <div class="avatar" id="chatAvatar">🧵</div>
      <div>
        <div class="nome" id="chatNome">Carregando...</div>
        <div class="status" id="chatStatus">Online</div>
        <div id="chatProdutoContexto" style="display:none; font-size:12.5px; color:var(--clay-dark); margin-top:2px; font-weight:500;"></div>
      </div>
    </div>

    <div class="chat-box" id="chatBox">
      <div class="chat-vazio">
        <div class="icon">💬</div>
        <p>Carregando mensagens...</p>
      </div>
    </div>

    <div class="chat-input-area">
      <textarea id="chatInput" placeholder="Digite sua mensagem..." rows="1"></textarea>
      <button class="btn btn-primary" onclick="enviarMensagemClick()">Enviar</button>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script>
    // ============================================
    // CHAT.JS - SISTEMA DE MENSAGENS
    // ============================================

    let currentUser = null
    let destinatarioId = null
    let destinatarioData = null
    let produtoContextoId = null
    let intervalId = null

    // ===== INICIALIZAÇÃO =====
    document.addEventListener('DOMContentLoaded', async () => {
      // Verifica usuário logado
      currentUser = await getCurrentUser()
      if (!currentUser) {
        document.getElementById('chatBox').innerHTML = `
              <div class="chat-vazio">
                <div class="icon">🔒</div>
                <p style="font-weight:500;">Faça login para conversar</p>
                <p style="font-size:14px; margin-top:4px;"><a href="login.html" style="color:var(--clay);">Entrar na sua conta</a></p>
              </div>
            `
        document.getElementById('chatInput').disabled = true
        document.querySelector('.chat-input-area .btn').disabled = true
        return
      }

      // Pega o ID do destinatário (e, se veio da página de um produto, o
      // produto de contexto) da URL
      const urlParams = new URLSearchParams(window.location.search)
      destinatarioId = urlParams.get('user')
      produtoContextoId = urlParams.get('produto')

      if (!destinatarioId) {
        document.getElementById('chatBox').innerHTML = `
              <div class="chat-vazio">
                <div class="icon">👤</div>
                <p style="font-weight:500;">Nenhum usuário selecionado</p>
                <p style="font-size:14px; margin-top:4px;">Selecione um artesão para conversar.</p>
              </div>
            `
        return
      }

      if (destinatarioId === currentUser.id) {
        document.getElementById('chatBox').innerHTML = `
              <div class="chat-vazio">
                <div class="icon">🤔</div>
                <p style="font-weight:500;">Você não pode conversar consigo mesmo</p>
              </div>
            `
        return
      }

      await carregarDestinatario()
      await carregarProdutoContexto()
      await carregarMensagens()
      configurarAutoRefresh()
      configurarEnter()
    })

    // ===== CONTEXTO DO PRODUTO (se veio da página de um produto) =====
    async function carregarProdutoContexto() {
      if (!produtoContextoId) return
      const { data } = await supabaseClient.from('produtos').select('nome').eq('id', produtoContextoId).maybeSingle()
      if (!data) return
      const el = document.getElementById('chatProdutoContexto')
      el.textContent = `📦 Sobre: ${data.nome}`
      el.style.display = 'block'
    }

    // ===== CARREGAR DESTINATÁRIO =====
    async function carregarDestinatario() {
      const { data, error } = await supabaseClient
        .from('users')
        .select('nome, avatar')
        .eq('id', destinatarioId)
        .single()

      if (error || !data) {
        document.getElementById('chatNome').textContent = 'Usuário não encontrado'
        document.getElementById('chatStatus').textContent = 'Offline'
        return
      }

      destinatarioData = data
      document.getElementById('chatNome').textContent = data.nome || 'Artesão'

      const avatarEl = document.getElementById('chatAvatar')
      if (data.avatar) {
        avatarEl.innerHTML = `<img src="${data.avatar}" alt="${data.nome}" />`
      } else {
        avatarEl.textContent = '🧵'
      }
    }

    // ===== CARREGAR MENSAGENS =====
    async function carregarMensagens() {
      if (!currentUser || !destinatarioId) return

      const { data, error } = await supabaseClient
        .from('mensagens')
        .select('*')
        .or(`and(remetente_id.eq.${currentUser.id},destinatario_id.eq.${destinatarioId}),and(remetente_id.eq.${destinatarioId},destinatario_id.eq.${currentUser.id})`)
        .order('created_at', { ascending: true })

      if (error) {
        console.error('Erro ao carregar mensagens:', error)
        return
      }

      const chatBox = document.getElementById('chatBox')

      if (!data || data.length === 0) {
        chatBox.innerHTML = `
              <div class="chat-vazio">
                <div class="icon">💬</div>
                <p style="font-weight:500;">Nenhuma mensagem ainda</p>
                <p style="font-size:14px; margin-top:4px;">Inicie uma conversa com o artesão!</p>
              </div>
            `
        return
      }

      chatBox.innerHTML = data.map(m => {
        const isEnviada = m.remetente_id === currentUser.id
        const hora = new Date(m.created_at).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })

        return `
              <div class="mensagem ${isEnviada ? 'enviada' : 'recebida'}">
                ${m.conteudo}
                <span class="hora">${hora}</span>
              </div>
            `
      }).join('')

      // Scroll para o final
      chatBox.scrollTop = chatBox.scrollHeight

      // Marca mensagens como lidas
      const mensagensNaoLidas = data
        .filter(m => m.destinatario_id === currentUser.id && !m.lida)
        .map(m => m.id)

      if (mensagensNaoLidas.length > 0) {
        await supabaseClient
          .from('mensagens')
          .update({ lida: true })
          .in('id', mensagensNaoLidas)
      }
    }

    // ===== ENVIAR MENSAGEM =====
    async function enviarMensagemClick() {
      const input = document.getElementById('chatInput')
      const conteudo = input.value.trim()

      if (!conteudo) {
        alert('Digite uma mensagem antes de enviar.')
        return
      }

      if (!currentUser || !destinatarioId) {
        alert('Você precisa estar logado para enviar mensagens.')
        return
      }

      const resultado = await enviarMensagem(destinatarioId, conteudo, produtoContextoId)

      if (resultado) {
        input.value = ''
        input.focus()
        await carregarMensagens()
      }
    }

    // ===== CONFIGURAR AUTO-REFRESH =====
    function configurarAutoRefresh() {
      if (intervalId) clearInterval(intervalId)
      intervalId = setInterval(() => {
        if (currentUser && destinatarioId) {
          carregarMensagens()
        }
      }, 5000) // Atualiza a cada 5 segundos
    }

    // ===== CONFIGURAR ENTER =====
    function configurarEnter() {
      const input = document.getElementById('chatInput')
      input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault()
          enviarMensagemClick()
        }
      })

      // Auto-resize do textarea
      input.addEventListener('input', () => {
        input.style.height = 'auto'
        input.style.height = Math.min(input.scrollHeight, 120) + 'px'
      })
    }

    console.log('✅ Chat Obeh carregado com sucesso!')
  </script>

</body>
</html>
