<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administração — Obeh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .admin-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 28px 60px;
    }
    .admin-wrap h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .admin-sub {
      color: var(--ink-soft);
      margin-bottom: 28px;
      font-size: 14px;
    }
    .loja-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .loja-card .info h3 {
      font-size: 17px;
      margin-bottom: 4px;
    }
    .loja-card .info p {
      font-size: 13px;
      color: var(--ink-soft);
      margin: 2px 0;
    }
    .loja-actions {
      display: flex;
      gap: 8px;
    }
    .btn-aprovar {
      background: #2f7a4d;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-recusar {
      background: none;
      border: 1px solid #c94a4a;
      color: #c94a4a;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-soft);
    }
    #bloqueado {
      display: none;
      text-align: center;
      padding: 80px 20px;
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="wrap nav">
      <a href="index.html" class="logo">
        <img src="https://i.postimg.cc/gjpXKcn5/imagem-2026-07-01-110451621.png" alt="Obeh Logo" style="height:40px;" />
      </a>
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <span id="userEmail" style="font-size:13px; color:var(--ink-soft);"></span>
        <a href="index.html" class="btn btn-ghost" style="padding:6px 16px; font-size:12px;">← Voltar à loja</a>
      </div>
    </div>
  </header>

  <div id="bloqueado">
    <p style="font-size:15px;">🔒 Esta área é restrita à administração da Obeh.</p>
  </div>

  <div class="admin-wrap" id="adminArea" style="display:none;">
    <h1>🛡️ Aprovação de lojas</h1>
    <p class="admin-sub">Lojas novas ficam pendentes até serem aprovadas. Revise antes de liberar a loja no marketplace.</p>

    <div id="lojasPendentes">
      <p style="color:var(--ink-soft); font-size:14px;">Carregando...</p>
    </div>

    <hr style="margin:40px 0; border:none; border-top:1px solid var(--line);" />

    <h1>🏬 Todas as lojas</h1>
    <p class="admin-sub">Veja e edite qualquer loja da plataforma, independente do dono.</p>
    <input id="buscaLojas" type="text" placeholder="Buscar por nome da loja, dono ou e-mail..." style="width:100%; padding:10px 14px; border:1px solid var(--line); border-radius:8px; font-size:14px; margin-bottom:16px;" oninput="filtrarTodasLojas()" />
    <div id="listaTodasLojas">
      <p style="color:var(--ink-soft); font-size:14px;">Carregando...</p>
    </div>
  </div>

  <!-- ===== SCRIPTS ===== -->
  <script src="js/supabase.js"></script>
  <script>
    const ADMIN_EMAIL = 'viniciusbirnecker@gmail.com'

    document.addEventListener('DOMContentLoaded', async () => {
      const user = await verificarUsuarioLogado()
      if (!user) return

      if ((user.email || '').toLowerCase() !== ADMIN_EMAIL) {
        document.getElementById('bloqueado').style.display = 'block'
        return
      }

      document.getElementById('userEmail').textContent = user.email
      document.getElementById('adminArea').style.display = 'block'
      await carregarLojasPendentes()
      await carregarTodasLojas()
    })

    async function carregarLojasPendentes() {
      const container = document.getElementById('lojasPendentes')
      const { data, error } = await supabaseClient
        .from('lojas')
        .select('*, users(nome, email, telefone)')
        .eq('ativa', false)
        .order('created_at', { ascending: true })

      if (error) {
        container.innerHTML = `<p style="color:#c94a4a;">Erro ao carregar lojas: ${error.message}</p>`
        return
      }

      if (!data || data.length === 0) {
        container.innerHTML = `<div class="empty-state"><p style="font-size:32px;">✅</p><p>Nenhuma loja pendente no momento.</p></div>`
        return
      }

      container.innerHTML = data.map(loja => `
        <div class="loja-card" id="loja-${loja.id}">
          <div class="info">
            <h3>${loja.nome_loja || 'Sem nome'}</h3>
            <p>👤 ${loja.users?.nome || '—'} · ${loja.users?.email || '—'}</p>
            <p>📞 ${loja.users?.telefone || 'Sem telefone'}</p>
            <p>🗓️ Cadastrada em ${new Date(loja.created_at).toLocaleDateString('pt-BR')}</p>
            ${loja.descricao ? `<p>📝 ${loja.descricao}</p>` : ''}
          </div>
          <div class="loja-actions">
            <button class="btn-aprovar" onclick="aprovarLoja('${loja.id}')">Aprovar</button>
            <button class="btn-recusar" onclick="recusarLoja('${loja.id}')">Recusar</button>
          </div>
        </div>
      `).join('')
    }

    async function aprovarLoja(id) {
      const { error } = await supabaseClient
        .from('lojas')
        .update({ ativa: true })
        .eq('id', id)

      if (error) {
        alert('❌ Erro ao aprovar loja: ' + error.message)
        return
      }

      const card = document.getElementById(`loja-${id}`)
      if (card) card.remove()
      alert('✅ Loja aprovada! Já está visível no marketplace.')
      await carregarLojasPendentes()
    }

    async function recusarLoja(id) {
      if (!confirm('Tem certeza que deseja recusar e remover esta loja? Essa ação não pode ser desfeita.')) return

      const { error } = await supabaseClient
        .from('lojas')
        .delete()
        .eq('id', id)

      if (error) {
        alert('❌ Erro ao recusar loja: ' + error.message)
        return
      }

      const card = document.getElementById(`loja-${id}`)
      if (card) card.remove()
      await carregarLojasPendentes()
    }

    async function carregarTodasLojas() {
      const container = document.getElementById('listaTodasLojas')
      const { data, error } = await supabaseClient
        .from('lojas')
        .select('*, users(nome, email, telefone, plano)')
        .order('created_at', { ascending: false })

      if (error) {
        container.innerHTML = `<p style="color:#c94a4a;">Erro ao carregar lojas: ${error.message}</p>`
        return
      }

      window.__todasLojasCache = data || []
      renderTodasLojas(window.__todasLojasCache)
    }

    function renderTodasLojas(lista) {
      const container = document.getElementById('listaTodasLojas')
      if (!lista || lista.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>Nenhuma loja encontrada.</p></div>'
        return
      }

      container.innerHTML = lista.map(loja => `
        <div class="loja-card" id="admloja-${loja.id}" style="flex-direction:column; align-items:stretch;">
          <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
            <div class="info">
              <h3>${loja.nome_loja || 'Sem nome'}</h3>
              <p>👤 ${loja.users?.nome || '—'} · ${loja.users?.email || '—'}</p>
              <p>📦 Plano: ${loja.users?.plano || 'free'} · Status: ${loja.ativa ? '✅ Ativa' : '⛔ Inativa'}</p>
            </div>
            <div class="loja-actions">
              <a href="loja.html?id=${loja.id}" target="_blank" class="btn btn-ghost" style="padding:8px 16px; font-size:13px;">Ver loja</a>
              <button class="btn-aprovar" onclick="toggleEditLoja('${loja.id}')">Editar</button>
            </div>
          </div>
          <div id="editForm-${loja.id}" style="display:none; margin-top:16px; border-top:1px solid var(--line); padding-top:16px;">
            <label style="font-size:13px; font-weight:600;">Nome da loja</label>
            <input id="edNome-${loja.id}" type="text" value="${(loja.nome_loja || '').replace(/"/g, '&quot;')}" style="width:100%; padding:8px 12px; border:1px solid var(--line); border-radius:8px; margin:6px 0 14px;" />

            <label style="font-size:13px; font-weight:600;">Descrição</label>
            <textarea id="edDesc-${loja.id}" style="width:100%; padding:8px 12px; border:1px solid var(--line); border-radius:8px; margin:6px 0 14px; min-height:70px;">${loja.descricao || ''}</textarea>

            <label style="font-size:13px; font-weight:600;">Instagram</label>
            <input id="edInsta-${loja.id}" type="text" value="${(loja.instagram || '').replace(/"/g, '&quot;')}" style="width:100%; padding:8px 12px; border:1px solid var(--line); border-radius:8px; margin:6px 0 14px;" />

            <label style="font-size:13px; font-weight:600;">WhatsApp</label>
            <input id="edWhats-${loja.id}" type="text" value="${(loja.whatsapp || '').replace(/"/g, '&quot;')}" style="width:100%; padding:8px 12px; border:1px solid var(--line); border-radius:8px; margin:6px 0 14px;" />

            <label style="font-size:13px; font-weight:600;">Link Mercado Pago</label>
            <input id="edMP-${loja.id}" type="text" value="${(loja.mercado_pago_link || '').replace(/"/g, '&quot;')}" style="width:100%; padding:8px 12px; border:1px solid var(--line); border-radius:8px; margin:6px 0 14px;" />

            <label style="font-size:13px; font-weight:600;">
              <input id="edAtiva-${loja.id}" type="checkbox" ${loja.ativa ? 'checked' : ''} /> Loja ativa (visível no marketplace)
            </label>

            <div style="display:flex; gap:8px; margin-top:14px;">
              <button class="btn-aprovar" onclick="salvarEdicaoLoja('${loja.id}')">💾 Salvar alterações</button>
              <button class="btn-recusar" onclick="toggleEditLoja('${loja.id}')">Cancelar</button>
            </div>
          </div>
        </div>
      `).join('')
    }

    function toggleEditLoja(id) {
      const form = document.getElementById(`editForm-${id}`)
      if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none'
    }

    async function salvarEdicaoLoja(id) {
      const updates = {
        nome_loja: document.getElementById(`edNome-${id}`).value.trim(),
        descricao: document.getElementById(`edDesc-${id}`).value.trim(),
        instagram: document.getElementById(`edInsta-${id}`).value.trim(),
        whatsapp: document.getElementById(`edWhats-${id}`).value.trim(),
        mercado_pago_link: document.getElementById(`edMP-${id}`).value.trim(),
        ativa: document.getElementById(`edAtiva-${id}`).checked
      }

      const { error } = await supabaseClient
        .from('lojas')
        .update(updates)
        .eq('id', id)

      if (error) {
        alert('❌ Erro ao salvar: ' + error.message)
        return
      }

      alert('✅ Loja atualizada com sucesso!')
      await carregarTodasLojas()
    }

    function filtrarTodasLojas() {
      const termo = document.getElementById('buscaLojas').value.toLowerCase()
      const cache = window.__todasLojasCache || []
      const filtradas = cache.filter(loja =>
        (loja.nome_loja || '').toLowerCase().includes(termo) ||
        (loja.users?.nome || '').toLowerCase().includes(termo) ||
        (loja.users?.email || '').toLowerCase().includes(termo)
      )
      renderTodasLojas(filtradas)
    }
  </script>
</body>
</html>
