<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administração — Obeh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .admin-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 28px 60px;
    }
    .admin-wrap h1 {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .admin-sub {
      color: var(--ink-soft);
      margin-bottom: 28px;
      font-size: 14px;
    }
    .loja-card {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .loja-card .info h3 {
      font-size: 17px;
      margin-bottom: 4px;
    }
    .loja-card .info p {
      font-size: 13px;
      color: var(--ink-soft);
      margin: 2px 0;
    }
    .loja-actions {
      display: flex;
      gap: 8px;
    }
    .btn-aprovar {
      background: #2f7a4d;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-recusar {
      background: none;
      border: 1px solid #c94a4a;
      color: #c94a4a;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-soft);
    }
    #bloqueado {
      display: none;
      text-align: center;
      padding: 80px 20px;
    }
    .admin-edit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .admin-field label {
      font-size: 12.5px;
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
      color: var(--ink-soft);
    }
    .admin-field input[type="text"],
    .admin-field textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    @media (max-width: 640px) {
      .admin-edit-grid {
        grid-template-columns: 1fr;
      }
    }
    .admin-section-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }
    .admin-section-head .contador {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: var(--clay);
      padding: 2px 10px;
      border-radius: 999px;
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="wrap nav">
      <a href="index.html" class="logo">
        <img src="https://i.postimg.cc/gjpXKcn5/imagem-2026-07-01-110451621.png" alt="Obeh Logo" style="height:40px;" />
      </a>
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <span id="userEmail" style="font-size:13px; color:var(--ink-soft);"></span>
        <a href="index.html" class="btn btn-ghost" style="padding:6px 16px; font-size:12px;">← Voltar à loja</a>
      </div>
    </div>
  </header>

  <div id="bloqueado">
    <p style="font-size:15px;">🔒 Esta área é restrita à administração da Obeh.</p>
  </div>

  <div class="admin-wrap" id="adminArea" style="display:none;">
    <div class="admin-section-head">
      <h1 style="margin:0;">🏬 Todas as lojas</h1>
      <span class="contador" id="contadorLojas">—</span>
    </div>
    <p class="admin-sub">Veja e edite qualquer loja da plataforma, independente do dono.</p>
    <input id="buscaLojas" type="text" placeholder="Buscar por nome da loja, dono ou e-mail..." style="width:100%; padding:10px 14px; border:1px solid var(--line); border-radius:8px; font-size:14px; margin-bottom:16px;" oninput="filtrarTodasLojas()" />
    <div id="listaTodasLojas">
      <p style="color:var(--ink-soft); font-size:14px;">Carregando...</p>
    </div>

    <hr style="margin:40px 0; border:none; border-top:1px solid var(--line);" />

    <div class="admin-section-head">
      <h1 style="margin:0;">🆘 Solicitações de suporte</h1>
      <span class="contador" id="contadorSuporte">—</span>
    </div>
    <p class="admin-sub">Pedidos de ajuda enviados pelos vendedores.</p>
    <div id="listaSuporte">
      <p style="color:var(--ink-soft); font-size:14px;">Carregando...</p>
    </div>
  </div>

  <!-- ===== SCRIPTS ===== -->
  <script src="js/supabase.js"></script>
  <script src="js/upload-r2.js"></script>
  <script>
    const ADMIN_EMAIL = 'viniciusbirnecker@gmail.com'

    document.addEventListener('DOMContentLoaded', async () => {
      const user = await verificarUsuarioLogado()
      if (!user) return

      if ((user.email || '').toLowerCase() !== ADMIN_EMAIL) {
        document.getElementById('bloqueado').style.display = 'block'
        return
      }

      document.getElementById('userEmail').textContent = user.email
      document.getElementById('adminArea').style.display = 'block'
      await carregarTodasLojas()
      await carregarSuporte()
    })


    async function carregarTodasLojas() {
      const container = document.getElementById('listaTodasLojas')
      const { data, error } = await supabaseClient
        .from('lojas')
        .select('*, users(nome, email, telefone, plano)')
        .order('created_at', { ascending: false })

      if (error) {
        container.innerHTML = `<p style="color:#c94a4a;">Erro ao carregar lojas: ${error.message}</p>`
        return
      }

      window.__todasLojasCache = data || []
      document.getElementById('contadorLojas').textContent = window.__todasLojasCache.length
      renderTodasLojas(window.__todasLojasCache)
    }

    function renderTodasLojas(lista) {
      const container = document.getElementById('listaTodasLojas')
      if (!lista || lista.length === 0) {
        container.innerHTML = '<div class="empty-state"><p>Nenhuma loja encontrada.</p></div>'
        return
      }

      container.innerHTML = lista.map(loja => `
        <div class="loja-card" id="admloja-${loja.id}" style="flex-direction:column; align-items:stretch;">
          <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px;">
            <div class="info">
              <h3>${loja.nome_loja || 'Sem nome'}</h3>
              <p>👤 ${loja.users?.nome || '—'} · ${loja.users?.email || '—'}</p>
              <p>📦 Plano: ${loja.users?.plano || 'free'} · Status: ${loja.ativa ? '✅ Ativa' : '⛔ Inativa'}</p>
            </div>
            <div class="loja-actions">
              <a href="loja.html?id=${loja.id}" target="_blank" class="btn btn-ghost" style="padding:8px 16px; font-size:13px;">Ver loja</a>
              <button class="btn-aprovar" onclick="toggleEditLoja('${loja.id}')">Editar</button>
        <button class="btn-aprovar" onclick="toggleProdutosLojaAdmin('${loja.id}')">📦 Produtos</button>
        <button class="btn-recusar" onclick="enviarAdvertenciaAdmin('${loja.id}','${loja.user_id}')">⚠️ Advertência</button>
        <button class="btn-recusar" style="background:#c94a4a; color:#fff; border:none;" onclick="excluirLojaAdmin('${loja.id}')">🗑️ Excluir loja</button>
            </div>
          </div>
        <div id="produtosArea-${loja.id}" style="display:none; margin-top:14px; border-top:1px solid var(--line); padding-top:14px;"></div>
          <div id="editForm-${loja.id}" style="display:none; margin-top:16px; border-top:1px solid var(--line); padding-top:16px;">
            <div class="admin-edit-grid">
              <div class="admin-field">
                <label>Nome da loja</label>
                <input id="edNome-${loja.id}" type="text" value="${(loja.nome_loja || '').replace(/"/g, '&quot;')}" />
              </div>
              <div class="admin-field">
                <label>Categoria da loja</label>
                <input id="edCategoria-${loja.id}" type="text" value="${(loja.categoria || '').replace(/"/g, '&quot;')}" />
              </div>
              <div class="admin-field">
                <label>Instagram</label>
                <input id="edInsta-${loja.id}" type="text" value="${(loja.instagram || '').replace(/"/g, '&quot;')}" />
              </div>
              <div class="admin-field">
                <label>WhatsApp</label>
                <input id="edWhats-${loja.id}" type="text" value="${(loja.whatsapp || '').replace(/"/g, '&quot;')}" />
              </div>
              <div class="admin-field">
                <label>CNPJ</label>
                <input id="edCnpj-${loja.id}" type="text" value="${(loja.cnpj || '').replace(/"/g, '&quot;')}" />
              </div>
              <div class="admin-field">
                <label>CEP de origem</label>
                <input id="edCep-${loja.id}" type="text" value="${(loja.cep_origem || '').replace(/"/g, '&quot;')}" />
              </div>
              <div class="admin-field">
                <label>Token do SuperFrete</label>
                <input id="edSuperfrete-${loja.id}" type="text" value="${(loja.superfrete_token || '').replace(/"/g, '&quot;')}" />
              </div>
              <div class="admin-field">
                <label>Link Mercado Pago (fallback manual)</label>
                <input id="edMP-${loja.id}" type="text" value="${(loja.mercado_pago_link || '').replace(/"/g, '&quot;')}" />
              </div>
              <div class="admin-field" style="grid-column:1/-1;">
                <label>Descrição</label>
                <textarea id="edDesc-${loja.id}" style="min-height:70px;">${loja.descricao || ''}</textarea>
              </div>
              <div class="admin-field">
                <label>Cor de destaque</label>
                <input id="edCorDestaque-${loja.id}" type="color" value="${loja.cor_destaque || '#B5502F'}" style="height:38px; padding:2px;" />
              </div>
              <div class="admin-field">
                <label>Cor da borda da logo</label>
                <input id="edCorBorda-${loja.id}" type="color" value="${loja.cor_borda_logo || '#B5502F'}" style="height:38px; padding:2px;" />
              </div>
            </div>

            <label style="font-size:13px; font-weight:600; display:block; margin:14px 0;">
              <input id="edAtiva-${loja.id}" type="checkbox" ${loja.ativa ? 'checked' : ''} /> Loja ativa (visível no marketplace)
            </label>

            <div style="display:flex; gap:8px; margin-top:14px;">
              <button class="btn-aprovar" onclick="salvarEdicaoLoja('${loja.id}')">💾 Salvar alterações</button>
              <button class="btn-recusar" onclick="toggleEditLoja('${loja.id}')">Cancelar</button>
            </div>
          </div>
        </div>
      `).join('')
    }

    function toggleEditLoja(id) {
      const form = document.getElementById(`editForm-${id}`)
      if (form) form.style.display = form.style.display === 'none' ? 'block' : 'none'
    }

    async function salvarEdicaoLoja(id) {
      const updates = {
        nome_loja: document.getElementById(`edNome-${id}`).value.trim(),
        descricao: document.getElementById(`edDesc-${id}`).value.trim(),
        instagram: document.getElementById(`edInsta-${id}`).value.trim(),
        whatsapp: document.getElementById(`edWhats-${id}`).value.trim(),
        mercado_pago_link: document.getElementById(`edMP-${id}`).value.trim(),
        cnpj: document.getElementById(`edCnpj-${id}`).value.trim(),
        cep_origem: document.getElementById(`edCep-${id}`).value.trim(),
        categoria: document.getElementById(`edCategoria-${id}`).value.trim(),
        superfrete_token: document.getElementById(`edSuperfrete-${id}`).value.trim(),
        cor_destaque: document.getElementById(`edCorDestaque-${id}`).value,
        cor_borda_logo: document.getElementById(`edCorBorda-${id}`).value,
        ativa: document.getElementById(`edAtiva-${id}`).checked
      }

      const { error } = await supabaseClient
        .from('lojas')
        .update(updates)
        .eq('id', id)

      if (error) {
        alert('❌ Erro ao salvar: ' + error.message)
        return
      }

      alert('✅ Loja atualizada com sucesso!')
      await carregarTodasLojas()
    }

        async function excluirLojaAdmin(id) {
      if (!confirm('Tem certeza que deseja EXCLUIR esta loja e todos os seus produtos? Essa ação não pode ser desfeita.')) return

      const [{ data: loja }, { data: produtos }, { data: cursos }] = await Promise.all([
        supabaseClient.from('lojas').select('logo, banner').eq('id', id).maybeSingle(),
        supabaseClient.from('produtos').select('fotos').eq('loja_id', id),
        supabaseClient.from('cursos').select('capa_url').eq('loja_id', id)
      ])

      await supabaseClient.from('produtos').delete().eq('loja_id', id)
      const { error } = await supabaseClient.from('lojas').delete().eq('id', id)
      if (error) {
        alert('❌ Erro ao excluir loja: ' + error.message)
        return
      }

      const imagens = [
        loja?.logo, loja?.banner,
        ...(produtos || []).flatMap(p => p.fotos || []),
        ...(cursos || []).map(c => c.capa_url)
      ].filter(Boolean)
      if (imagens.length) await deletarImagensR2(imagens)

      alert('✅ Loja excluída com sucesso.')
      await carregarTodasLojas()
    }

    async function enviarAdvertenciaAdmin(lojaId, userId) {
      const mensagem = prompt('Digite a mensagem de advertência para o vendedor:')
      if (!mensagem || !mensagem.trim()) return
      const { error } = await supabaseClient
        .from('advertencias')
        .insert({ loja_id: lojaId, user_id: userId, mensagem: mensagem.trim() })
      if (error) {
        alert('❌ Erro ao enviar advertência: ' + error.message)
        return
      }
      alert('✅ Advertência enviada ao vendedor.')
    }

    async function toggleProdutosLojaAdmin(lojaId) {
      const area = document.getElementById(`produtosArea-${lojaId}`)
      if (!area) return
      if (area.style.display === 'block') {
        area.style.display = 'none'
        return
      }
      area.style.display = 'block'
      await carregarProdutosLojaAdmin(lojaId)
    }

    async function carregarProdutosLojaAdmin(lojaId) {
      const area = document.getElementById(`produtosArea-${lojaId}`)
      if (!area) return
      area.innerHTML = '<p style="color:var(--ink-soft); font-size:13px;">Carregando produtos...</p>'
      const { data, error } = await supabaseClient
        .from('produtos')
        .select('id, nome, preco, estoque, status')
        .eq('loja_id', lojaId)
        .order('created_at', { ascending: false })
      if (error) {
        area.innerHTML = `<p style="color:#c94a4a; font-size:13px;">Erro: ${error.message}</p>`
        return
      }
      if (!data || data.length === 0) {
        area.innerHTML = '<p style="color:var(--ink-soft); font-size:13px;">Nenhum produto cadastrado.</p>'
        return
      }
      area.innerHTML = data.map(p => `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--line); font-size:13px;">
          <span>${p.nome} — R$ ${Number(p.preco).toFixed(2)} · Estoque: ${p.estoque} ${p.status === 'pausado' ? '(pausado)' : ''}</span>
          <button class="btn-recusar" style="padding:4px 10px; font-size:12px;" onclick="excluirProdutoAdmin('${p.id}','${lojaId}')">Excluir</button>
        </div>
      `).join('')
    }

    async function excluirProdutoAdmin(produtoId, lojaId) {
      if (!confirm('Excluir este produto?')) return
      const { data: produto } = await supabaseClient.from('produtos').select('fotos').eq('id', produtoId).maybeSingle()
      const { error } = await supabaseClient.from('produtos').delete().eq('id', produtoId)
      if (error) {
        alert('❌ Erro ao excluir produto: ' + error.message)
        return
      }
      if (produto?.fotos?.length) await deletarImagensR2(produto.fotos)
      await carregarProdutosLojaAdmin(lojaId)
    }

    function filtrarTodasLojas() {
      const termo = document.getElementById('buscaLojas').value.toLowerCase()
      const cache = window.__todasLojasCache || []
      const filtradas = cache.filter(loja =>
        (loja.nome_loja || '').toLowerCase().includes(termo) ||
        (loja.users?.nome || '').toLowerCase().includes(termo) ||
        (loja.users?.email || '').toLowerCase().includes(termo)
      )
      renderTodasLojas(filtradas)
    }
  async function carregarSuporte() {
    const container = document.getElementById('listaSuporte')
    const { data, error } = await supabaseClient
      .from('suporte_solicitacoes')
      .select('*, users(nome, email), lojas(nome_loja)')
      .order('created_at', { ascending: false })

    if (error) {
      container.innerHTML = `<p style="color:#c94a4a;">Erro ao carregar solicitações: ${error.message}</p>`
      return
    }

    const abertas = (data || []).filter(s => s.status !== 'resolvido').length
    document.getElementById('contadorSuporte').textContent = abertas + ' aberta(s)'

    if (!data || data.length === 0) {
      container.innerHTML = '<div class="empty-state"><p>Nenhuma solicitação no momento.</p></div>'
      return
    }

    container.innerHTML = data.map(s => `
      <div class="loja-card" id="suporte-${s.id}" style="flex-direction:column; align-items:stretch;">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:12px;">
          <div class="info">
            <h3>${s.assunto || 'Sem assunto'} ${s.status === 'resolvido' ? '✅' : '🔴'}</h3>
            <p>👤 ${s.users?.nome || '—'} · ${s.users?.email || '—'} ${s.lojas?.nome_loja ? '· Loja: ' + s.lojas.nome_loja : ''}</p>
            <p>${s.mensagem || ''}</p>
            <p style="font-size:11px;">${new Date(s.created_at).toLocaleString('pt-BR')}</p>
          </div>
          <div class="loja-actions">
            <button class="btn-aprovar" onclick="window.location.href='chat.html?user=${s.user_id}'">💬 Responder</button>
            ${s.status !== 'resolvido' ? `<button class="btn-aprovar" onclick="resolverSuporte('${s.id}')">Marcar como resolvido</button>` : ''}
          </div>
        </div>
      </div>
    `).join('')
  }

  async function resolverSuporte(id) {
    const { error } = await supabaseClient
      .from('suporte_solicitacoes')
      .update({ status: 'resolvido', updated_at: new Date().toISOString() })
      .eq('id', id)

    if (error) {
      alert('❌ Erro ao atualizar: ' + error.message)
      return
    }

    await carregarSuporte()
  }

  </script>
</body>
</html>
