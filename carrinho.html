<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrinho — Obeh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <script src="https://sdk.mercadopago.com/js/v2"></script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .carrinho-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 28px 40px;
    }

    .carrinho-container h1 {
      font-size: 32px;
      margin: 32px 0 24px;
    }

    .carrinho-confianca {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--ink-soft);
      margin-bottom: 20px;
    }

    .carrinho-confianca-ovelha {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }

    .carrinho-card {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(43,38,32,0.08);
      padding: 24px;
    }

    @media (max-width: 600px) {
      .carrinho-card {
        padding: 16px;
      }
    }

    .carrinho-item {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .carrinho-item .thumb {
      width: 80px;
      height: 80px;
      border-radius: 4px;
      background: #E9DFC7;
      overflow: hidden;
      flex-shrink: 0;
    }

    .carrinho-item .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .carrinho-item .info {
      flex: 1;
      min-width: 120px;
    }

    .carrinho-item .info .nome {
      font-weight: 600;
      font-size: 16px;
    }

    .carrinho-item .info .preco {
      color: var(--ink-soft);
      font-size: 14px;
    }

    .carrinho-item .quantidade {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .carrinho-item .quantidade button {
      background: none;
      border: 1px solid var(--line);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .carrinho-item .quantidade button:hover {
      background: var(--ink);
      color: white;
    }

    .carrinho-item .quantidade span {
      font-weight: 600;
      min-width: 24px;
      text-align: center;
    }

    .carrinho-item .remover {
      color: var(--clay);
      cursor: pointer;
      font-size: 18px;
      background: none;
      border: none;
      padding: 4px;
    }

    .carrinho-item .remover:hover {
      color: var(--clay-dark);
    }

    .carrinho-total {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .carrinho-total .total-label {
      font-size: 18px;
      font-weight: 600;
    }

    .carrinho-total .total-value {
      font-family: 'Space Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      color: var(--clay);
    }

    .carrinho-total .btn {
      padding: 14px 40px;
      font-size: 16px;
    }

    .carrinho-vazio {
      text-align: center;
      padding: 80px 20px;
      color: var(--ink-soft);
    }

    .carrinho-vazio .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .carrinho-vazio .btn {
      margin-top: 16px;
    }

    .carrinho-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    @media (max-width: 600px) {
      .carrinho-item {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }

      .carrinho-item .thumb {
        margin: 0 auto;
      }

      .carrinho-item .quantidade {
        justify-content: center;
      }

      .carrinho-total {
        flex-direction: column;
        text-align: center;
      }

      .carrinho-total .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="wrap nav">
      <a href="index.html" class="logo">
        <img src="https://i.postimg.cc/gjpXKcn5/imagem-2026-07-01-110451621.png" alt="Obeh Logo" style="height:40px;" />
      </a>
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <a href="index.html" class="btn btn-ghost" style="padding:6px 16px; font-size:12px;">← Continuar comprando</a>
        <button class="cart-btn" id="cartToggle" title="Carrinho">
          🛒 <span id="cartCount">0</span>
        </button>
      </div>
    </div>
  </header>

  <div class="carrinho-container">
    <h1>🛒 Seu carrinho</h1>
    <div class="carrinho-confianca">
      <svg class="carrinho-confianca-ovelha" viewBox="0 0 220 200" aria-hidden="true">
        <ellipse cx="115" cy="182" rx="78" ry="10" fill="#2B2620" opacity="0.08" />
        <rect x="70" y="150" width="14" height="34" rx="7" fill="#8C3D22" />
        <rect x="100" y="158" width="14" height="26" rx="7" fill="#8C3D22" />
        <rect x="130" y="158" width="14" height="26" rx="7" fill="#8C3D22" />
        <rect x="158" y="150" width="14" height="34" rx="7" fill="#8C3D22" />
        <g fill="#F7F2E7" stroke="#B5502F" stroke-width="3">
          <circle cx="60"  cy="95"  r="30" />
          <circle cx="95"  cy="72"  r="34" />
          <circle cx="135" cy="70"  r="36" />
          <circle cx="172" cy="90"  r="32" />
          <circle cx="185" cy="125" r="28" />
          <circle cx="150" cy="140" r="34" />
        </g>
      </svg>
      <span>🔒 Compra segura, direto com quem faz — cada loja recebe na própria conta, sem intermediário.</span>
    </div>
    <div class="carrinho-card">
      <div id="carrinhoContent">
        <!-- Injetado via JS -->
      </div>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script>
    // ============================================
    // CARRINHO.JS - PÁGINA DO CARRINHO
    // ============================================

    // ===== CUPOM DE DESCONTO =====
    let cupomAplicado = null
    let descontosPorLoja = {} // { lojaId: desconto_percentual }

    function getTotalComDesconto() {
      return carrinho.reduce((total, item) => {
        const desconto = descontosPorLoja[item.loja_id] || 0
        const precoComDesconto = Number(item.preco) * (1 - desconto / 100)
        return total + precoComDesconto * item.quantidade
      }, 0)
    }

    async function aplicarCupom() {
      const resultadoEl = document.getElementById('cupomResultado')
      const codigo = document.getElementById('cupomInput').value.trim().toUpperCase()
      if (!codigo) {
        cupomAplicado = null
        descontosPorLoja = {}
        resultadoEl.textContent = ''
        renderizarCarrinhoCompleto()
        return
      }

      const lojaIds = [...new Set(carrinho.map(item => item.loja_id).filter(Boolean))]
      if (lojaIds.length === 0) return

      const { data, error } = await supabaseClient
        .from('cupons')
        .select('*')
        .in('loja_id', lojaIds)
        .eq('codigo', codigo)
        .eq('ativo', true)

      if (error || !data || data.length === 0) {
        cupomAplicado = null
        descontosPorLoja = {}
        resultadoEl.textContent = '❌ Cupom inválido ou expirado.'
        renderizarCarrinhoCompleto()
        return
      }

      const hoje = new Date().toISOString().slice(0, 10)
      const validos = data.filter(c => !c.validade || c.validade >= hoje)
      if (validos.length === 0) {
        cupomAplicado = null
        descontosPorLoja = {}
        resultadoEl.textContent = '❌ Cupom expirado.'
        renderizarCarrinhoCompleto()
        return
      }

      cupomAplicado = codigo
      descontosPorLoja = {}
      validos.forEach(c => { descontosPorLoja[c.loja_id] = Number(c.desconto_percentual) })

      resultadoEl.textContent = `✅ Cupom aplicado! ${validos.map(c => `${c.desconto_percentual}% de desconto`).join(', ')}.`
      renderizarCarrinhoCompleto()
    }

    // ===== INICIALIZAÇÃO =====
    document.addEventListener('DOMContentLoaded', () => {
      renderizarCarrinhoCompleto()
      atualizarCarrinhoUI()

      // Atualiza contador do header
      document.getElementById('cartCount').textContent = getQuantidadeCarrinho()
    })

    // ===== RENDERIZAR CARRINHO =====
    function renderizarCarrinhoCompleto() {
      const container = document.getElementById('carrinhoContent')

      if (carrinho.length === 0) {
        container.innerHTML = `
              <div class="carrinho-vazio">
                <div class="icon">🛒</div>
                <p style="font-size:18px; font-weight:500;">Seu carrinho está vazio</p>
                <p style="font-size:14px; margin-top:8px;">Que tal explorar nossas peças incríveis?</p>
                <a href="index.html" class="btn btn-primary">Explorar peças</a>
              </div>
            `
        return
      }

      const gruposVisuais = agruparCarrinhoPorLoja().map(grupo => {
        const itensCompletos = grupo.itens.map(i => carrinho.find(c => c.id === i.produtoId)).filter(Boolean)
        const desconto = descontosPorLoja[grupo.lojaId] || 0
        const subtotal = itensCompletos.reduce((acc, item) => acc + Number(item.preco) * (1 - desconto / 100) * item.quantidade, 0)
        return { ...grupo, itensCompletos, subtotal }
      })

      container.innerHTML = `
            ${gruposVisuais.map(grupo => `
              <div style="border:1px solid var(--line); border-radius:8px; margin-bottom:16px; overflow:hidden;">
                <div style="background:var(--bg-card); padding:10px 16px; font-weight:600; display:flex; justify-content:space-between; align-items:center;">
                  <span>🏪 ${grupo.nomeLoja}</span>
                  <span style="font-weight:400; font-size:13px; color:var(--ink-soft);">${grupo.itensCompletos.length} item(ns)</span>
                </div>
                ${grupo.itensCompletos.map(item => `
                  <div class="carrinho-item" style="border:none; border-radius:0; border-top:1px solid var(--line); margin-bottom:0;">
                    <div class="thumb">
                      ${item.fotos && item.fotos.length > 0
                        ? `<img src="${item.fotos[0]}" alt="${item.nome}" />`
                        : '🧵'
                      }
                    </div>
                    <div class="info">
                      <div class="nome">${item.nome}</div>
                      <div class="preco">R$ ${Number(item.preco).toFixed(2)}</div>
                    </div>
                    <div class="quantidade">
                      <button onclick="alterarQuantidade('${item.id}', -1)">−</button>
                      <span>${item.quantidade}</span>
                      <button onclick="alterarQuantidade('${item.id}', 1)">+</button>
                    </div>
                    <button class="remover" onclick="removerItem('${item.id}')">✕</button>
                  </div>
                `).join('')}
                <div style="border-top:1px solid var(--line); padding:12px 16px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; background:var(--bg-card);">
                  <span style="font-weight:600;">Total desta loja: R$ ${grupo.subtotal.toFixed(2)}</span>
                  <div style="display:flex; gap:8px; flex-wrap:wrap;">
                    <button class="btn btn-ghost" style="padding:6px 14px; font-size:13px;" onclick="pagarComPix('${grupo.lojaId}')">💠 Pix</button>
                    <button class="btn btn-ghost" style="padding:6px 14px; font-size:13px;" onclick="abrirPagamentoCartao('${grupo.lojaId}')">💳 Cartão</button>
                    <button class="btn btn-primary" style="padding:6px 14px; font-size:13px;" onclick="finalizarCompra('${grupo.lojaId}', this)">Finalizar esta loja</button>
                  </div>
                </div>
                <div id="pixResultado-${grupo.lojaId}" style="padding:0 16px 16px;"></div>
                <div id="cartaoResultado-${grupo.lojaId}" style="padding:0 16px 16px;"></div>
              </div>
            `).join('')}

            <div style="border:1px solid var(--line); border-radius:8px; padding:16px; margin-bottom:16px;">
        <div style="font-weight:500; margin-bottom:8px;">📦 Calcular frete</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <input type="text" id="freteCep" placeholder="Seu CEP (00000-000)" maxlength="9" style="flex:1; min-width:160px;" />
          <button class="btn btn-ghost" onclick="calcularFrete()">Calcular</button>
        </div>
        <div id="freteResultado" style="margin-top:10px; font-size:14px;"></div>
      </div>

      <div style="border:1px solid var(--line); border-radius:8px; padding:16px; margin-bottom:16px;">
        <div style="font-weight:500; margin-bottom:8px;">🏷️ Cupom de desconto</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <input type="text" id="cupomInput" placeholder="Código do cupom" style="flex:1; min-width:160px; text-transform:uppercase;" value="${cupomAplicado || ''}" />
          <button class="btn btn-ghost" onclick="aplicarCupom()">Aplicar</button>
        </div>
        <div id="cupomResultado" style="margin-top:10px; font-size:14px;"></div>
      </div>

      <div class="carrinho-total">
              ${gruposVisuais.length === 1 ? `
              <div>
                <div class="total-label">Total</div>
                <div class="total-value">R$ ${getTotalComDesconto().toFixed(2)}</div>
              </div>
              ` : `
              <div style="font-size:13px; color:var(--ink-soft);">Cada loja acima é cobrada separadamente — use o botão "Finalizar esta loja" de cada uma.</div>
              `}
              <div style="display:flex; gap:12px; flex-wrap:wrap;">
                <button class="btn btn-ghost" onclick="limparCarrinho()">Limpar carrinho</button>
              </div>
            </div>
          `
    }

    // ===== AÇÕES DO CARRINHO =====
    function alterarQuantidade(produtoId, delta) {
      atualizarQuantidade(produtoId, delta)
      renderizarCarrinhoCompleto()
      atualizarCarrinhoUI()
      document.getElementById('cartCount').textContent = getQuantidadeCarrinho()
    }

    function removerItem(produtoId) {
      removerDoCarrinho(produtoId)
      renderizarCarrinhoCompleto()
      atualizarCarrinhoUI()
      document.getElementById('cartCount').textContent = getQuantidadeCarrinho()
    }

    function limparCarrinho() {
      if (!confirm('Tem certeza que deseja limpar o carrinho?')) return
      carrinho = []
      renderizarCarrinhoCompleto()
      atualizarCarrinhoUI()
      document.getElementById('cartCount').textContent = 0
    }

    // Agrupa o carrinho por loja: cada grupo vira UMA cobrança (produtos +
    // frete), já que cada vendedor despacha e recebe separadamente.
    function agruparCarrinhoPorLoja() {
      const porLoja = {}
      for (const item of carrinho) {
        const lojaId = item.loja_id || 'sem-loja'
        if (!porLoja[lojaId]) {
          porLoja[lojaId] = { lojaId, nomeLoja: item.loja_nome || 'Loja', itens: [] }
        }
        porLoja[lojaId].itens.push({ produtoId: item.id, quantidade: item.quantidade })
      }
      return Object.values(porLoja)
    }

    function getCepDestinoInformado() {
      const cep = document.getElementById('freteCep')?.value.replace(/\D/g, '') || ''
      return cep.length === 8 ? cep : undefined
    }

    // lojaId opcional: quando vem de um botão "Finalizar esta loja", processa
    // só aquele grupo. Sem lojaId, processa todas as lojas do carrinho (cada
    // uma ainda vira uma cobrança separada, uma por vez).
    async function finalizarCompra(lojaId, btnEl) {
      if (carrinho.length === 0) {
        alert('🛒 Seu carrinho está vazio!')
        return
      }

      const usuario = await getCurrentUser()
      if (!usuario) {
        if (confirm('Você precisa estar logado pra finalizar a compra. Ir para o login agora?')) {
          window.location.href = 'login.html?retorno=carrinho.html'
        }
        return
      }

      const cepDestino = getCepDestinoInformado()
      if (!cepDestino && !confirm('⚠️ Você não informou o CEP pra calcular o frete — a compra vai seguir sem cobrar frete. Continuar assim mesmo?')) {
        return
      }

      const grupos = agruparCarrinhoPorLoja().filter(g => !lojaId || g.lojaId === lojaId)
      const quantidade = grupos.reduce((acc, g) => acc + g.itens.reduce((a, i) => a + i.quantidade, 0), 0)
      if (!confirm(`🛍️ Confirmar compra de ${quantidade} item(s)?`)) {
        return
      }

      const btnFinalizar = btnEl || document.querySelector('.carrinho-total .btn-primary')
      if (btnFinalizar) {
        btnFinalizar.disabled = true
        btnFinalizar.textContent = 'Processando...'
      }

      const resultados = []
      const erros = []

      for (const grupo of grupos) {
        try {
          const res = await fetch('/.netlify/functions/mp-criar-pagamento', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ itens: grupo.itens, compradorId: usuario.id, cupomCodigo: cupomAplicado || undefined, cepDestino })
          })
          const data = await res.json()
          if (!res.ok || !data.initPoint) {
            erros.push(grupo.nomeLoja)
            continue
          }
          resultados.push({ nome: grupo.nomeLoja, lojaId: grupo.lojaId, initPoint: data.initPoint })
        } catch (err) {
          erros.push(grupo.nomeLoja)
        }
      }

      if (btnFinalizar) {
        btnFinalizar.disabled = false
        btnFinalizar.textContent = lojaId ? 'Finalizar esta loja' : 'Finalizar compra'
      }

      if (resultados.length === 0) {
        alert('❌ Não foi possível iniciar o pagamento agora. Tente novamente em instantes.')
        return
      }

      resultados.forEach(r => removerLojaDoCarrinho(r.lojaId))
      renderizarCarrinhoCompleto()
      atualizarCarrinhoUI()
      document.getElementById('cartCount').textContent = getQuantidadeCarrinho()

      if (erros.length > 0) {
        alert(`⚠️ Não foi possível iniciar o pagamento de: ${erros.join(', ')}. As outras lojas seguem normalmente pro pagamento.`)
      }

      if (resultados.length === 1) {
        window.location.href = resultados[0].initPoint
        return
      }

      // Múltiplas lojas processadas de uma vez (botão "Finalizar compra"
      // geral): o Mercado Pago processa um pagamento por vez pra cada loja,
      // então mostra um link pra cada uma.
      const container = document.getElementById('carrinhoContent')
      container.innerHTML = `
        <div class="carrinho-vazio">
          <p style="font-size:18px; font-weight:500;">✅ Pedido registrado!</p>
          <p style="font-size:14px; margin-top:8px;">Como seu carrinho tinha produtos de lojas diferentes, finalize o pagamento de cada uma separadamente:</p>
          <div style="display:flex; flex-direction:column; gap:10px; margin-top:16px; align-items:center;">
            ${resultados.map(r => `<a class="btn btn-primary" href="${r.initPoint}" target="_blank" rel="noopener">Pagar: ${r.nome}</a>`).join('')}
          </div>
        </div>
      `
    }

    // Remove do carrinho só os itens de uma loja (usado depois que o
    // pagamento daquela loja foi iniciado com sucesso — as outras lojas do
    // carrinho continuam intactas)
    function removerLojaDoCarrinho(lojaId) {
      carrinho = carrinho.filter(item => (item.loja_id || 'sem-loja') !== lojaId)
      salvarCarrinhoStorage()
    }

    // ===== PAGAR COM PIX (split automático) =====
    // lojaId opcional: sem ele, gera Pix pra todas as lojas do carrinho de
    // uma vez (um QR code por loja); com lojaId, só daquela loja.
    async function pagarComPix(lojaId) {
      if (carrinho.length === 0) {
        alert('🛒 Seu carrinho está vazio!')
        return
      }

      const usuario = await getCurrentUser()
      if (!usuario) {
        if (confirm('Você precisa estar logado pra pagar com Pix. Ir para o login agora?')) {
          window.location.href = 'login.html?retorno=carrinho.html'
        }
        return
      }

      const cepDestino = getCepDestinoInformado()
      if (!cepDestino && !confirm('⚠️ Você não informou o CEP pra calcular o frete — a compra vai seguir sem cobrar frete. Continuar assim mesmo?')) {
        return
      }

      const grupos = agruparCarrinhoPorLoja().filter(g => !lojaId || g.lojaId === lojaId)
      const resultadoEl = lojaId ? document.getElementById(`pixResultado-${lojaId}`) : document.getElementById('pixResultado-geral')
      if (resultadoEl) resultadoEl.innerHTML = '<p style="color:var(--ink-soft); font-size:14px;">Gerando Pix...</p>'

      const resultados = []
      const erros = []

      for (const grupo of grupos) {
        try {
          const res = await fetch('/.netlify/functions/mp-criar-pix', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ itens: grupo.itens, compradorId: usuario.id, cupomCodigo: cupomAplicado || undefined, cepDestino })
          })
          const data = await res.json()
          if (!res.ok || !data.qrCode) {
            erros.push(`${grupo.nomeLoja}: ${data.error || 'erro desconhecido'}`)
            continue
          }
          resultados.push({ nome: grupo.nomeLoja, lojaId: grupo.lojaId, pedidoId: data.pedidoId, qrCode: data.qrCode, qrCodeBase64: data.qrCodeBase64, valorTotal: data.valorTotal })
        } catch (err) {
          erros.push(`${grupo.nomeLoja}: erro de conexão`)
        }
      }

      if (resultados.length === 0) {
        if (resultadoEl) resultadoEl.innerHTML = `<p style="color:#c94a4a; font-size:14px;">❌ Não foi possível gerar o Pix.${erros.length ? '<br>' + erros.join('<br>') : ''}</p>`
        return
      }

      // Cada resultado é mostrado no bloco da própria loja (ou, quando gerado
      // pra várias lojas de uma vez, empilhado no bloco da primeira só pra
      // não perder o link — o normal é usar o botão de cada loja).
      resultados.forEach(r => {
        const alvoEl = document.getElementById(`pixResultado-${r.lojaId}`) || resultadoEl
        if (!alvoEl) return
        alvoEl.innerHTML = `
          <div style="border:1px solid var(--line); border-radius:8px; padding:16px; margin-top:8px; text-align:center;">
            <p style="font-size:13px; color:var(--ink-soft); margin-bottom:10px;">Total: R$ ${Number(r.valorTotal).toFixed(2)}</p>
            <img src="data:image/png;base64,${r.qrCodeBase64}" alt="QR Code Pix" style="width:200px; height:200px; margin:0 auto 10px;" />
            <textarea readonly style="width:100%; font-size:11px; padding:8px; border:1px solid var(--line); border-radius:6px; resize:none; height:60px;">${r.qrCode}</textarea>
            <button class="btn btn-ghost" style="margin-top:8px;" onclick="navigator.clipboard.writeText('${r.qrCode}'); this.textContent='Copiado!'">Copiar código</button>
            <p id="pixStatus-${r.pedidoId}" style="margin-top:10px; font-size:13px; color:var(--ink-soft);">⏳ Aguardando pagamento...</p>
          </div>
        `
      })

      if (erros.length > 0 && resultadoEl) {
        resultadoEl.insertAdjacentHTML('afterbegin', `<p style="color:#c94a4a; font-size:13px; margin-bottom:8px;">⚠️ ${erros.join(', ')}</p>`)
      }

      resultados.forEach(r => monitorarPagamentoPix(r.pedidoId, r.lojaId))
    }

    async function monitorarPagamentoPix(pedidoId, lojaId, tentativas = 0) {
      if (!pedidoId || tentativas > 60) return // ~5 minutos (60 x 5s)

      const { data } = await supabaseClient.from('vendas').select('status').eq('pedido_id', pedidoId).limit(1).maybeSingle()
      const statusEl = document.getElementById(`pixStatus-${pedidoId}`)
      if (!statusEl) return

      if (data?.status === 'pago') {
        statusEl.textContent = '✅ Pagamento confirmado!'
        statusEl.style.color = '#2f7a4d'
        if (lojaId) removerLojaDoCarrinho(lojaId)
        atualizarCarrinhoUI()
        document.getElementById('cartCount').textContent = getQuantidadeCarrinho()
        return
      }

      if (data?.status === 'recusado' || data?.status === 'cancelado') {
        statusEl.textContent = '❌ Pagamento não foi concluído.'
        statusEl.style.color = '#c94a4a'
        return
      }

      setTimeout(() => monitorarPagamentoPix(pedidoId, lojaId, tentativas + 1), 5000)
    }

    // ===== PAGAR COM CARTÃO (Card Payment Brick — só carrinho de uma loja) =====
    let cardBrickController = null

    async function abrirPagamentoCartao(lojaId) {
      if (carrinho.length === 0) {
        alert('🛒 Seu carrinho está vazio!')
        return
      }

      const usuario = await getCurrentUser()
      if (!usuario) {
        if (confirm('Você precisa estar logado pra pagar com cartão. Ir para o login agora?')) {
          window.location.href = 'login.html?retorno=carrinho.html'
        }
        return
      }

      const grupo = agruparCarrinhoPorLoja().find(g => g.lojaId === lojaId)
      if (!grupo) return

      const cepDestino = getCepDestinoInformado()
      if (!cepDestino && !confirm('⚠️ Você não informou o CEP pra calcular o frete — a compra vai seguir sem cobrar frete. Continuar assim mesmo?')) {
        return
      }

      const resultadoEl = document.getElementById(`cartaoResultado-${lojaId}`)
      resultadoEl.innerHTML = '<p style="color:var(--ink-soft); font-size:14px;">Carregando formulário de pagamento...</p>'

      try {
        const chaveRes = await fetch(`/.netlify/functions/mp-obter-chave-publica?lojaId=${grupo.lojaId}`)
        const chaveData = await chaveRes.json()
        if (!chaveRes.ok || !chaveData.publicKey) {
          resultadoEl.innerHTML = `<p style="color:#c94a4a; font-size:14px;">❌ ${chaveData.error || 'Pagamento com cartão não disponível pra essa loja.'}</p>`
          return
        }

        const desconto = descontosPorLoja[grupo.lojaId] || 0
        const itensCompletos = grupo.itens.map(i => carrinho.find(c => c.id === i.produtoId)).filter(Boolean)
        const valorAproximado = itensCompletos.reduce((acc, item) => acc + Number(item.preco) * (1 - desconto / 100) * item.quantidade, 0)

        const containerId = `cardPaymentBrick_container_${lojaId}`
        resultadoEl.innerHTML = `
          <div style="border:1px solid var(--line); border-radius:8px; padding:16px; margin-top:8px;">
            <div id="${containerId}"></div>
          </div>
        `

        if (cardBrickController) {
          await cardBrickController.unmount().catch(() => {})
          cardBrickController = null
        }

        const mp = new MercadoPago(chaveData.publicKey, { locale: 'pt-BR' })
        cardBrickController = await mp.bricks().create('cardPayment', containerId, {
          initialization: { amount: Math.round(valorAproximado * 100) / 100 },
          callbacks: {
            onReady: () => {},
            onSubmit: (cardFormData) => processarPagamentoCartao(grupo, cepDestino, cardFormData),
            onError: (error) => {
              console.error('Erro no formulário de cartão:', error)
              resultadoEl.insertAdjacentHTML('beforeend', '<p style="color:#c94a4a; font-size:13px; margin-top:8px;">❌ Erro no formulário de cartão. Confira os dados e tente novamente.</p>')
            }
          }
        })
      } catch (err) {
        console.error(err)
        resultadoEl.innerHTML = '<p style="color:#c94a4a; font-size:14px;">❌ Não foi possível carregar o formulário de pagamento.</p>'
      }
    }

    // Chamado pelo Brick quando o comprador confirma o formulário — o token
    // do cartão já vem pronto (gerado pelo SDK do Mercado Pago no navegador,
    // a Obeh nunca vê o número do cartão).
    async function processarPagamentoCartao(grupo, cepDestino, cardFormData) {
      const usuario = await getCurrentUser()
      const resultadoEl = document.getElementById(`cartaoResultado-${grupo.lojaId}`)

      try {
        const res = await fetch('/.netlify/functions/mp-criar-pagamento-cartao', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ itens: grupo.itens, compradorId: usuario.id, cupomCodigo: cupomAplicado || undefined, cepDestino, cardFormData })
        })
        const data = await res.json()

        if (!res.ok) {
          resultadoEl.insertAdjacentHTML('beforeend', `<p style="color:#c94a4a; font-size:13px; margin-top:8px;">❌ ${data.error || 'Não foi possível processar o pagamento.'}</p>`)
          return
        }

        if (data.status === 'approved') {
          resultadoEl.innerHTML = `<div style="border:1px solid var(--line); border-radius:8px; padding:16px; text-align:center;"><p style="font-weight:600; color:#2f7a4d;">✅ Pagamento aprovado!</p><p style="font-size:13px; color:var(--ink-soft); margin-top:4px;">Total: R$ ${Number(data.valorTotal).toFixed(2)}</p></div>`
          // Só tira do modelo de dados agora — não re-renderiza a lista ainda,
          // senão o bloco desta loja (com a mensagem de sucesso) some na hora
          removerLojaDoCarrinho(grupo.lojaId)
          atualizarCarrinhoUI()
          document.getElementById('cartCount').textContent = getQuantidadeCarrinho()
        } else if (data.status === 'in_process' || data.status === 'pending') {
          resultadoEl.innerHTML = `<div style="border:1px solid var(--line); border-radius:8px; padding:16px; text-align:center;"><p style="font-weight:600;">⏳ Pagamento em análise</p><p style="font-size:13px; color:var(--ink-soft); margin-top:4px;">Você vai receber a confirmação em breve.</p></div>`
          removerLojaDoCarrinho(grupo.lojaId)
          atualizarCarrinhoUI()
          document.getElementById('cartCount').textContent = getQuantidadeCarrinho()
        } else {
          resultadoEl.innerHTML = `<div style="border:1px solid var(--line); border-radius:8px; padding:16px; text-align:center;"><p style="font-weight:600; color:#c94a4a;">❌ Pagamento recusado</p><p style="font-size:13px; color:var(--ink-soft); margin-top:4px;">${data.statusDetail || 'Tente outro cartão.'}</p></div>`
        }
      } catch (err) {
        resultadoEl.insertAdjacentHTML('beforeend', '<p style="color:#c94a4a; font-size:13px; margin-top:8px;">❌ Erro de conexão ao processar o pagamento.</p>')
      }
    }

    async function calcularFrete() {
      const cep = document.getElementById('freteCep').value.replace(/\D/g, '')
      const resultadoEl = document.getElementById('freteResultado')

      if (carrinho.length === 0) {
        resultadoEl.textContent = '🛒 Seu carrinho está vazio.'
        return
      }

      if (cep.length !== 8) {
        resultadoEl.textContent = '⚠️ Informe um CEP válido (8 dígitos).'
        return
      }

      resultadoEl.textContent = 'Calculando...'

      try {
        const res = await fetch('/.netlify/functions/calcular-frete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            cepDestino: cep,
            itens: carrinho.map(item => ({ produtoId: item.id, quantidade: item.quantidade }))
          })
        })
        const data = await res.json()

        if (!res.ok || !data.fretes) {
          resultadoEl.textContent = '❌ Não foi possível calcular o frete agora.'
          return
        }

        resultadoEl.innerHTML = data.fretes.map(f => {
          const opcoes = f.opcoes.map(o => `${o.nome}: R$ ${Number(o.preco).toFixed(2)}${o.prazoDias ? ` (${o.prazoDias} dias úteis)` : ''}`).join(' · ')
          const aviso = f.estimativaAproximada ? ' <span style="color:var(--muted);">(estimativa aproximada)</span>' : ''
          return `<div style="margin-top:6px;"><strong>${f.nomeLoja}:</strong> ${opcoes}${aviso}</div>`
        }).join('')
      } catch (err) {
        resultadoEl.textContent = '❌ Erro ao calcular o frete. Tente novamente.'
      }
    }

    // ===== EXPORTA FUNÇÕES =====
    window.alterarQuantidade = alterarQuantidade
    window.removerItem = removerItem
    window.limparCarrinho = limparCarrinho
    window.finalizarCompra = finalizarCompra
    window.pagarComPix = pagarComPix
    window.abrirPagamentoCartao = abrirPagamentoCartao
    window.calcularFrete = calcularFrete
    window.aplicarCupom = aplicarCupom

    console.log('✅ Página do carrinho carregada com sucesso!')
  </script>

</body>
</html>
