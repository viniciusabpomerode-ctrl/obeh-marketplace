<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrinho — Obeh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .carrinho-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 28px 40px;
    }

    .carrinho-container h1 {
      font-size: 32px;
      margin: 32px 0 24px;
    }

    .carrinho-item {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .carrinho-item .thumb {
      width: 80px;
      height: 80px;
      border-radius: 4px;
      background: #E9DFC7;
      overflow: hidden;
      flex-shrink: 0;
    }

    .carrinho-item .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .carrinho-item .info {
      flex: 1;
      min-width: 120px;
    }

    .carrinho-item .info .nome {
      font-weight: 600;
      font-size: 16px;
    }

    .carrinho-item .info .preco {
      color: var(--ink-soft);
      font-size: 14px;
    }

    .carrinho-item .quantidade {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .carrinho-item .quantidade button {
      background: none;
      border: 1px solid var(--line);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .carrinho-item .quantidade button:hover {
      background: var(--ink);
      color: white;
    }

    .carrinho-item .quantidade span {
      font-weight: 600;
      min-width: 24px;
      text-align: center;
    }

    .carrinho-item .remover {
      color: var(--clay);
      cursor: pointer;
      font-size: 18px;
      background: none;
      border: none;
      padding: 4px;
    }

    .carrinho-item .remover:hover {
      color: var(--clay-dark);
    }

    .carrinho-total {
      background: var(--bg-card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .carrinho-total .total-label {
      font-size: 18px;
      font-weight: 600;
    }

    .carrinho-total .total-value {
      font-family: 'Space Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      color: var(--clay);
    }

    .carrinho-total .btn {
      padding: 14px 40px;
      font-size: 16px;
    }

    .carrinho-vazio {
      text-align: center;
      padding: 80px 20px;
      color: var(--ink-soft);
    }

    .carrinho-vazio .icon {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .carrinho-vazio .btn {
      margin-top: 16px;
    }

    .carrinho-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    @media (max-width: 600px) {
      .carrinho-item {
        flex-direction: column;
        align-items: stretch;
        text-align: center;
      }

      .carrinho-item .thumb {
        margin: 0 auto;
      }

      .carrinho-item .quantidade {
        justify-content: center;
      }

      .carrinho-total {
        flex-direction: column;
        text-align: center;
      }

      .carrinho-total .btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="wrap nav">
      <a href="index.html" class="logo">
        <img src="https://i.postimg.cc/gjpXKcn5/imagem-2026-07-01-110451621.png" alt="Obeh Logo" style="height:40px;" />
      </a>
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <a href="index.html" class="btn btn-ghost" style="padding:6px 16px; font-size:12px;">← Continuar comprando</a>
        <button class="cart-btn" id="cartToggle" title="Carrinho">
          🛒 <span id="cartCount">0</span>
        </button>
      </div>
    </div>
  </header>

  <div class="carrinho-container">
    <h1>🛒 Seu carrinho</h1>
    <div id="carrinhoContent">
      <!-- Injetado via JS -->
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script>
    // ============================================
    // CARRINHO.JS - PÁGINA DO CARRINHO
    // ============================================

    // ===== INICIALIZAÇÃO =====
    document.addEventListener('DOMContentLoaded', () => {
      renderizarCarrinhoCompleto()
      atualizarCarrinhoUI()

      // Atualiza contador do header
      document.getElementById('cartCount').textContent = getQuantidadeCarrinho()
    })

    // ===== RENDERIZAR CARRINHO =====
    function renderizarCarrinhoCompleto() {
      const container = document.getElementById('carrinhoContent')

      if (carrinho.length === 0) {
        container.innerHTML = `
              <div class="carrinho-vazio">
                <div class="icon">🛒</div>
                <p style="font-size:18px; font-weight:500;">Seu carrinho está vazio</p>
                <p style="font-size:14px; margin-top:8px;">Que tal explorar nossas peças incríveis?</p>
                <a href="index.html" class="btn btn-primary">Explorar peças</a>
              </div>
            `
        return
      }

      container.innerHTML = `
            ${carrinho.map(item => `
              <div class="carrinho-item">
                <div class="thumb">
                  ${item.fotos && item.fotos.length > 0
                    ? `<img src="${item.fotos[0]}" alt="${item.nome}" />`
                    : '🧵'
                  }
                </div>
                <div class="info">
                  <div class="nome">${item.nome}</div>
                  <div class="preco">R$ ${Number(item.preco).toFixed(2)}</div>
                </div>
                <div class="quantidade">
                  <button onclick="alterarQuantidade('${item.id}', -1)">−</button>
                  <span>${item.quantidade}</span>
                  <button onclick="alterarQuantidade('${item.id}', 1)">+</button>
                </div>
                <button class="remover" onclick="removerItem('${item.id}')">✕</button>
              </div>
            `).join('')}

            <div style="border:1px solid var(--line); border-radius:8px; padding:16px; margin-bottom:16px;">
        <div style="font-weight:500; margin-bottom:8px;">📦 Calcular frete</div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <input type="text" id="freteCep" placeholder="Seu CEP (00000-000)" maxlength="9" style="flex:1; min-width:160px;" />
          <button class="btn btn-ghost" onclick="calcularFrete()">Calcular</button>
        </div>
        <div id="freteResultado" style="margin-top:10px; font-size:14px;"></div>
      </div>

      <div class="carrinho-total">
              <div>
                <div class="total-label">Total</div>
                <div class="total-value">R$ ${getTotalCarrinho().toFixed(2)}</div>
              </div>
              <div style="display:flex; gap:12px; flex-wrap:wrap;">
                <button class="btn btn-ghost" onclick="limparCarrinho()">Limpar carrinho</button>
                <button class="btn btn-primary" onclick="finalizarCompra()">Finalizar compra</button>
              </div>
            </div>
          `
    }

    // ===== AÇÕES DO CARRINHO =====
    function alterarQuantidade(produtoId, delta) {
      atualizarQuantidade(produtoId, delta)
      renderizarCarrinhoCompleto()
      atualizarCarrinhoUI()
      document.getElementById('cartCount').textContent = getQuantidadeCarrinho()
    }

    function removerItem(produtoId) {
      removerDoCarrinho(produtoId)
      renderizarCarrinhoCompleto()
      atualizarCarrinhoUI()
      document.getElementById('cartCount').textContent = getQuantidadeCarrinho()
    }

    function limparCarrinho() {
      if (!confirm('Tem certeza que deseja limpar o carrinho?')) return
      carrinho = []
      renderizarCarrinhoCompleto()
      atualizarCarrinhoUI()
      document.getElementById('cartCount').textContent = 0
    }

    async function finalizarCompra() {
      if (carrinho.length === 0) {
        alert('🛒 Seu carrinho está vazio!')
        return
      }

      const usuario = await getCurrentUser()
      if (!usuario) {
        if (confirm('Você precisa estar logado pra finalizar a compra. Ir para o login agora?')) {
          window.location.href = 'login.html'
        }
        return
      }

      // Calcula total
      const total = getTotalCarrinho()
      const quantidade = getQuantidadeCarrinho()

      if (!confirm(`🛍️ Confirmar compra de ${quantidade} item(s) no valor total de R$ ${total.toFixed(2)}?`)) {
        return
      }

      const btnFinalizar = document.querySelector('.carrinho-total .btn-primary')
      if (btnFinalizar) {
        btnFinalizar.disabled = true
        btnFinalizar.textContent = 'Processando...'
      }

      const resultados = []
      const erros = []

      for (const item of carrinho) {
        try {
          const res = await fetch('/.netlify/functions/mp-criar-pagamento', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ produtoId: item.id, quantidade: item.quantidade, compradorId: usuario.id })
          })
          const data = await res.json()
          if (!res.ok || !data.initPoint) {
            erros.push(item.nome)
            continue
          }
          resultados.push({ nome: item.nome, initPoint: data.initPoint })
        } catch (err) {
          erros.push(item.nome)
        }
      }

      if (btnFinalizar) {
        btnFinalizar.disabled = false
        btnFinalizar.textContent = 'Finalizar compra'
      }

      if (resultados.length === 0) {
        alert('❌ Não foi possível iniciar o pagamento agora. Tente novamente em instantes.')
        return
      }

      carrinho = []
      renderizarCarrinhoCompleto()
      atualizarCarrinhoUI()
      document.getElementById('cartCount').textContent = 0

      if (erros.length > 0) {
        alert(`⚠️ Não foi possível iniciar o pagamento de: ${erros.join(', ')}. Os outros itens seguem normalmente pro pagamento.`)
      }

      if (resultados.length === 1) {
        window.location.href = resultados[0].initPoint
        return
      }

      // Carrinho com produtos de vendedores diferentes: o Mercado Pago processa
      // um pagamento por vez pra cada vendedor, então mostra um link pra cada um.
      const container = document.getElementById('carrinhoContent')
      container.innerHTML = `
        <div class="carrinho-vazio">
          <p style="font-size:18px; font-weight:500;">✅ Pedido registrado!</p>
          <p style="font-size:14px; margin-top:8px;">Como seu carrinho tinha produtos de vendedores diferentes, finalize o pagamento de cada um separadamente:</p>
          <div style="display:flex; flex-direction:column; gap:10px; margin-top:16px; align-items:center;">
            ${resultados.map(r => `<a class="btn btn-primary" href="${r.initPoint}" target="_blank" rel="noopener">Pagar: ${r.nome}</a>`).join('')}
          </div>
        </div>
      `
    }

    async function calcularFrete() {
      const cep = document.getElementById('freteCep').value.replace(/\D/g, '')
      const resultadoEl = document.getElementById('freteResultado')

      if (carrinho.length === 0) {
        resultadoEl.textContent = '🛒 Seu carrinho está vazio.'
        return
      }

      if (cep.length !== 8) {
        resultadoEl.textContent = '⚠️ Informe um CEP válido (8 dígitos).'
        return
      }

      resultadoEl.textContent = 'Calculando...'

      try {
        const res = await fetch('/.netlify/functions/calcular-frete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            cepDestino: cep,
            itens: carrinho.map(item => ({ produtoId: item.id, quantidade: item.quantidade }))
          })
        })
        const data = await res.json()

        if (!res.ok || !data.fretes) {
          resultadoEl.textContent = '❌ Não foi possível calcular o frete agora.'
          return
        }

        resultadoEl.innerHTML = data.fretes.map(f => {
          const opcoes = f.opcoes.map(o => `${o.nome}: R$ ${Number(o.preco).toFixed(2)}${o.prazoDias ? ` (${o.prazoDias} dias úteis)` : ''}`).join(' · ')
          const aviso = f.estimativaAproximada ? ' <span style="color:var(--muted);">(estimativa aproximada)</span>' : ''
          return `<div style="margin-top:6px;"><strong>${f.nomeLoja}:</strong> ${opcoes}${aviso}</div>`
        }).join('')
      } catch (err) {
        resultadoEl.textContent = '❌ Erro ao calcular o frete. Tente novamente.'
      }
    }

    // ===== EXPORTA FUNÇÕES =====
    window.alterarQuantidade = alterarQuantidade
    window.removerItem = removerItem
    window.limparCarrinho = limparCarrinho
    window.finalizarCompra = finalizarCompra
    window.calcularFrete = calcularFrete

    console.log('✅ Página do carrinho carregada com sucesso!')
  </script>

</body>
</html>
