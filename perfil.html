<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil — Obeh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .perfil-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 28px 40px;
    }

    .perfil-container h1 {
      font-size: 28px;
      margin: 32px 0 24px;
    }

    .perfil-avatar {
      text-align: center;
      margin-bottom: 24px;
    }

    .perfil-avatar .avatar-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #E9DFC7;
      margin: 0 auto;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      border: 3px solid var(--line);
    }

    .perfil-avatar .avatar-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="wrap nav">
      <a href="index.html" class="logo">
        <img src="https://i.postimg.cc/gjpXKcn5/imagem-2026-07-01-110451621.png" alt="Obeh Logo" style="height:40px;" />
      </a>
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <a href="dashboard.html" class="btn btn-ghost" style="padding:6px 16px; font-size:12px;">← Voltar ao painel</a>
        <a href="#" onclick="logout()" class="btn btn-ghost" style="padding:6px 16px; font-size:12px;">Sair</a>
      </div>
    </div>
  </header>

  <div class="perfil-container">
    <h1>👤 Meu perfil</h1>

    <div class="perfil-avatar">
      <div class="avatar-circle" id="avatarCircle">🧵</div>
      <div style="margin-top:10px;">
        <input type="file" id="perfilAvatarFile" accept="image/*" onchange="handleAvatarUpload(event)" style="display:none;" />
        <button type="button" class="btn btn-ghost" style="padding:6px 16px; font-size:12px;" onclick="document.getElementById('perfilAvatarFile').click()">📷 Trocar foto</button>
        <div id="avatarUploadStatus" style="font-size:12px; color:var(--ink-soft); margin-top:6px;"></div>
      </div>
    </div>

    <form id="perfilForm" onsubmit="handlePerfilSubmit(event)">
      <div class="form-group">
        <label>Nome completo</label>
        <input type="text" id="perfilNome" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="perfilEmail" disabled style="background:#EDE6D6; opacity:0.7;" />
      </div>
      <div class="form-group">
        <label>Telefone</label>
        <input type="tel" id="perfilTelefone" placeholder="(11) 99999-9999" />
      </div>
      <div class="form-group">
        <label>Biografia</label>
        <textarea id="perfilBio" placeholder="Conte um pouco sobre você..."></textarea>
      </div>
      <div class="form-group">
        <label>CPF</label>
        <input type="text" id="perfilCpf" placeholder="000.000.000-00" />
      </div>
      <div class="form-group">
        <label>CEP</label>
        <input type="text" id="perfilCep" placeholder="00000-000" maxlength="9" />
      </div>
      <div class="form-row" style="display:flex; gap:10px;">
        <div class="form-group" style="flex:3;">
          <label>Rua</label>
          <input type="text" id="perfilRua" placeholder="Rua / Avenida" />
        </div>
        <div class="form-group" style="flex:1;">
          <label>Número</label>
          <input type="text" id="perfilNumero" placeholder="Nº" />
        </div>
      </div>
      <div class="form-group">
        <label>Bairro</label>
        <input type="text" id="perfilBairro" placeholder="Bairro" />
      </div>
      <div class="form-row" style="display:flex; gap:10px;">
        <div class="form-group" style="flex:3;">
          <label>Cidade</label>
          <input type="text" id="perfilCidade" placeholder="Cidade" />
        </div>
        <div class="form-group" style="flex:1;">
          <label>UF</label>
          <input type="text" id="perfilEstado" placeholder="UF" maxlength="2" />
        </div>
      </div>
      <button type="submit" class="btn btn-primary auth-btn">Salvar alterações</button>
    </form>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/upload-r2.js"></script>
  <script>
    // ============================================
    // PERFIL.JS - EDIÇÃO DE PERFIL
    // ============================================

    let currentUser = null
    let avatarUrlAtual = ''

    // ===== INICIALIZAÇÃO =====
    document.addEventListener('DOMContentLoaded', async () => {
      const user = await verificarUsuarioLogado()
      if (!user) return

      currentUser = user

      // Garante que perfil existe no banco
      await ensureUserAndLoja(user)

      await carregarPerfil(user.id)
    })

    // ===== CARREGAR PERFIL =====
    async function carregarPerfil(userId) {
      const { data, error } = await supabaseClient
        .from('users')
        .select('*')
        .eq('id', userId)
        .maybeSingle()

      if (error || !data) {
        alert('Erro ao carregar perfil.')
        return
      }

      document.getElementById('perfilNome').value = data.nome || ''
      document.getElementById('perfilEmail').value = data.email || ''
      document.getElementById('perfilTelefone').value = data.telefone || ''
      avatarUrlAtual = data.avatar || ''
      document.getElementById('perfilBio').value = data.bio || ''
      document.getElementById('perfilCpf').value = data.cpf || ''
      document.getElementById('perfilCep').value = data.cep || ''
      document.getElementById('perfilRua').value = data.rua || ''
      document.getElementById('perfilNumero').value = data.numero || ''
      document.getElementById('perfilBairro').value = data.bairro || ''
      document.getElementById('perfilCidade').value = data.cidade || ''
      document.getElementById('perfilEstado').value = data.estado || ''

      // Avatar
      const avatarCircle = document.getElementById('avatarCircle')
      if (data.avatar) {
        avatarCircle.innerHTML = `<img src="${data.avatar}" alt="Avatar" />`
      } else {
        avatarCircle.textContent = '🧵'
      }
    }

    // ===== UPLOAD DA FOTO DE PERFIL =====
    async function handleAvatarUpload(event) {
      const file = event.target.files[0]
      if (!file) return

      const statusEl = document.getElementById('avatarUploadStatus')
      statusEl.textContent = 'Enviando foto...'

      try {
        const urlAntiga = avatarUrlAtual
        const novaUrl = await uploadImagemR2(file, 'perfis')
        avatarUrlAtual = novaUrl
        document.getElementById('avatarCircle').innerHTML = `<img src="${novaUrl}" alt="Avatar" />`
        statusEl.textContent = '✅ Foto enviada! Clique em "Salvar alterações" pra confirmar.'
        if (urlAntiga) deletarImagensR2(urlAntiga)
      } catch (err) {
        statusEl.textContent = '❌ ' + err.message
      }
    }

    // ===== SALVAR PERFIL =====
    async function handlePerfilSubmit(e) {
      e.preventDefault()

      const nome = document.getElementById('perfilNome').value
      const telefone = document.getElementById('perfilTelefone').value
      const avatar = avatarUrlAtual
      const bio = document.getElementById('perfilBio').value
      const cpf = document.getElementById('perfilCpf').value.trim()
      const cep = document.getElementById('perfilCep').value.trim()
      const rua = document.getElementById('perfilRua').value.trim()
      const numero = document.getElementById('perfilNumero').value.trim()
      const bairro = document.getElementById('perfilBairro').value.trim()
      const cidade = document.getElementById('perfilCidade').value.trim()
      const estado = document.getElementById('perfilEstado').value.trim()

      const { error } = await supabaseClient
        .from('users')
        .update({
          nome,
          telefone,
          avatar,
          bio,
          cpf,
          cep,
          rua,
          numero,
          bairro,
          cidade,
          estado,
          updated_at: new Date().toISOString()
        })
        .eq('id', currentUser.id)

      if (error) {
        alert('❌ Erro ao salvar perfil: ' + error.message)
        return
      }

      alert('✅ Perfil atualizado com sucesso!')

      // Atualiza avatar
      const avatarCircle = document.getElementById('avatarCircle')
      if (avatar) {
        avatarCircle.innerHTML = `<img src="${avatar}" alt="Avatar" />`
      } else {
        avatarCircle.textContent = '🧵'
      }
    }

    console.log('✅ Página de perfil carregada com sucesso!')
  </script>

</body>
</html>
