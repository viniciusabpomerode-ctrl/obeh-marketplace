[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Sitemap dinâmico (gerado pela function a partir do Supabase). Precisa vir
# ANTES do rewrite genérico /:slug abaixo — como sitemap.xml não é um arquivo
# real no repositório, sem esta regra ele cairia no rewrite de loja.
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

# Link bonito da loja: obeh.com.br/nome-da-loja reescreve por trás dos panos
# pra loja.html?slug=nome-da-loja. Como o Netlify sempre tenta servir um
# arquivo real primeiro, isso só entra em ação quando o caminho não bate com
# nenhuma página/arquivo existente — não conflita com index.html, css/, js/ etc.
[[redirects]]
  from = "/:slug"
  to = "/loja.html?slug=:slug"
  status = 200
