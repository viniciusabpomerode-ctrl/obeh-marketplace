<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Cursos de artesanato — Obeh</title>
  <meta name="description" content="Aprenda artesanato com quem vive disso: cursos de crochê, cerâmica, bordado, marcenaria e mais, criados pelos próprios artesãos da Obeh." />
  <link rel="canonical" href="https://obeh.com.br/cursos.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .cursos-container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 28px 60px;
    }

    .cursos-hero {
      text-align: center;
      padding: 48px 20px 32px;
    }

    .cursos-hero h1 {
      font-size: clamp(28px, 3vw, 38px);
      margin-bottom: 10px;
    }

    .cursos-hero p {
      color: var(--ink-soft);
      font-size: 15px;
      max-width: 560px;
      margin: 0 auto;
    }

    .cursos-empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-soft);
    }

    .cursos-empty .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <div class="wrap nav">
      <a href="index.html" class="logo">
        <img src="https://i.postimg.cc/gjpXKcn5/imagem-2026-07-01-110451621.png" alt="Obeh Logo" style="height:40px;" />
      </a>
      <div style="display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <a href="index.html" class="btn btn-ghost" style="padding:6px 16px; font-size:12px;">← Voltar à loja</a>
      </div>
    </div>
  </header>

  <div class="cursos-hero">
    <p style="font-family:'Space Mono', monospace; font-size:11px; text-transform:uppercase; color:var(--olive); margin-bottom:8px;">🎓 Aprenda artesanato</p>
    <h1>Cursos feitos por artesãos de verdade</h1>
    <p>Aprenda técnicas de cerâmica, tecelagem, madeira, couro e muito mais direto com quem vive disso.</p>
  </div>

  <div class="cursos-container">
    <div style="max-width:340px; margin-bottom:20px;">
      <select id="cursosCategoriaFiltro" onchange="filtrarCursosPorCategoria(this.value)">
        <option value="">Todas as categorias</option>
        <option value="bordado_costura">Bordado e costura</option>
        <option value="croche_trico">Crochê e tricô</option>
        <option value="ceramica">Cerâmica e biscuit</option>
        <option value="marcenaria">Marcenaria e entalhe</option>
        <option value="pintura_ilustracao">Pintura e ilustração</option>
        <option value="resina">Resina</option>
        <option value="papelaria">Papelaria e scrapbook</option>
        <option value="velas_sabonetes">Velas e sabonetes artesanais</option>
        <option value="bijuteria">Bijuteria e acessórios</option>
        <option value="reciclagem">Reciclagem e upcycling</option>
        <option value="digital_moldes">Digital — moldes e apostilas</option>
        <option value="digital_gestao">Digital — precificação e gestão pra artesãos</option>
      </select>
    </div>
    <div class="grid" id="cursosGrid">
      <!-- Injetado via JS -->
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script>
    let cursosCache = []

    const CATEGORIAS_CURSO = {
      bordado_costura: 'Bordado e costura',
      croche_trico: 'Crochê e tricô',
      ceramica: 'Cerâmica e biscuit',
      marcenaria: 'Marcenaria e entalhe',
      pintura_ilustracao: 'Pintura e ilustração',
      resina: 'Resina',
      papelaria: 'Papelaria e scrapbook',
      velas_sabonetes: 'Velas e sabonetes artesanais',
      bijuteria: 'Bijuteria e acessórios',
      reciclagem: 'Reciclagem e upcycling',
      digital_moldes: 'Digital — moldes e apostilas',
      digital_gestao: 'Digital — precificação e gestão'
    }

    document.addEventListener('DOMContentLoaded', async () => {
      cursosCache = await getCursos() || []
      renderizarCursos(cursosCache)
    })

    function filtrarCursosPorCategoria(categoria) {
      const filtrados = categoria ? cursosCache.filter(c => c.categoria === categoria) : cursosCache
      renderizarCursos(filtrados)
    }

    function renderizarCursos(cursos) {
      const grid = document.getElementById('cursosGrid')

      if (!cursos || cursos.length === 0) {
        grid.innerHTML = `
              <div class="cursos-empty">
                <div class="icon">🎓</div>
                <p style="font-size:18px; font-weight:500;">Nenhum curso publicado ainda</p>
                <p style="font-size:14px; margin-top:8px;">Volte em breve para ver os cursos dos nossos artesãos.</p>
              </div>
            `
        return
      }

      grid.innerHTML = cursos.map(c => `
            <div class="card" onclick="window.location.href='curso.html?id=${c.id}'">
              <div class="card-media" style="background:${c.capa_url ? 'transparent' : '#E9DFC7'}">
                ${c.capa_url
                  ? `<img src="${c.capa_url}" alt="${c.titulo}" loading="lazy" />`
                  : `<span class="placeholder">🎓</span>`
                }
              </div>
              <div class="card-body">
                <div class="card-cat">${CATEGORIAS_CURSO[c.categoria] || 'Curso'}</div>
                <div class="card-title">${c.titulo}</div>
                <div class="card-maker">${c.lojas?.nome_loja || 'Artesão'}</div>
                <div class="card-foot">
                  <div class="price">R$ ${Number(c.preco).toFixed(2).replace('.', ',')}</div>
                </div>
              </div>
            </div>
          `).join('')
    }

    window.filtrarCursosPorCategoria = filtrarCursosPorCategoria
  </script>

</body>
</html>
